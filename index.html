<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fpimentel Seguros CRM - Executive Edition</title>
    <!-- Chosen Palette: Navy Executive (Slate 950, Royal Blue 600, Success Emerald 500, Alert Amber 500, Rose 500) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-sidebar { background: #0f172a; }
        .chart-container { position: relative; width: 100%; max-height: 280px; margin: auto; }
        .kanban-col { min-height: 500px; background: rgba(241, 245, 249, 0.4); border: 2px dashed #e2e8f0; border-radius: 2rem; padding: 1.5rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .top-rank-badge { background: linear-gradient(135deg, #2563eb, #1e3a8a); }
    </style>
</head>
<body class="text-slate-900">
    <div id="root">
        <div class="h-screen flex items-center justify-center bg-slate-950 text-white text-center">
            <div>
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                <p class="font-black uppercase tracking-widest text-xs opacity-50 italic text-blue-400">Sincronizando Sistema Fpimentel...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- COMPONENTE LOGO CON TU NUEVA IMAGEN ---
        const Logo = ({ className = "h-14", textVisible = true }) => {
            const [imgError, setImgError] = useState(false);
            return (
                <div className="flex flex-col items-center gap-2">
                    {!imgError ? (
                        <img 
                            src="https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png" 
                            className={className}
                            onError={() => setImgError(true)}
                        />
                    ) : (
                        <div className="w-14 h-14 bg-white rounded-xl flex items-center justify-center text-blue-600 font-black italic shadow-2xl border-4 border-blue-500 mb-2">F</div>
                    )}
                    {textVisible && <span className="text-blue-400 font-black tracking-[0.3em] text-[9px] uppercase italic">Fpimentel Seguros</span>}
                </div>
            );
        };

        const App = () => {
            const [loggedUser, setLoggedUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('policy'); 

            // --- ESTADOS DE DATOS ---
            const [users, setUsers] = useState([
                { id: 'u1', username: 'Eduardog', name: 'Eduardo G.', role: 'Admin', avatar: 'E', pass: '123456' }
            ]);

            const [branches, setBranches] = useState([
                { name: "Automóvil", commission: 17.5 },
                { name: "Fianzas", commission: 12.5 },
                { name: "Salud", commission: 12.0 },
                { name: "Hogar", commission: 10.5 },
                { name: "PYME", commission: 10.5 }
            ]);

            const [leads, setLeads] = useState([
                { id: 1, name: "Andrés Pimentel", status: "Nuevo", branch: "Automóvil", phone: "8094763535", date: "2024-05-11" },
                { id: 2, name: "Empresa Corporativa SA", status: "Propuesta", branch: "Fianzas", phone: "8295551122", date: "2024-05-10" },
                { id: 3, name: "Hotel Playa Azul", status: "Perdido", branch: "Hogar", phone: "8090002222", date: "2024-05-01" }
            ]);

            const [policies, setPolicies] = useState([
                { id: 101, client: "Don Fernando Pimentel", branch: "Multiriesgo", premium: 125000, expiry: "2024-06-15", agent: "Eduardog", phone: "8095550000", freq: 'Anual' },
                { id: 102, client: "Andrés Pimentel", branch: "Automóvil", premium: 18500, expiry: "2024-12-20", agent: "Eduardog", phone: "8094763535", freq: 'Mensual' },
                { id: 103, client: "Vanessa Marie", branch: "Salud", premium: 4500, expiry: "2025-01-10", agent: "Eduardog", phone: "8090001111", freq: 'Mensual' }
            ]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // --- LÓGICA DE ESTADÍSTICAS ---
            const stats = useMemo(() => {
                const breakdown = { Mensual: 0, Trimestral: 0, Anual: 0, Total: 0 };
                const byBranch = {};
                
                policies.forEach(p => {
                    const rate = branches.find(b => b.name === p.branch)?.commission || 10;
                    const comm = (p.premium * rate) / 100;
                    
                    if (p.freq === 'Mensual') breakdown.Mensual += (comm / 12);
                    else if (p.freq === 'Trimestral') breakdown.Trimestral += (comm / 4);
                    else breakdown.Anual += comm;
                    
                    breakdown.Total += comm;
                    byBranch[p.branch] = (byBranch[p.branch] || 0) + comm;
                });
                
                const top5 = [...policies]
                    .map(p => {
                        const rate = branches.find(b => b.name === p.branch)?.commission || 10;
                        return { 
                            ...p, 
                            rate,
                            commValue: (p.premium * rate) / 100 
                        }
                    })
                    .sort((a, b) => b.commValue - a.commValue)
                    .slice(0, 5);

                return { breakdown, byBranch, top5 };
            }, [policies, branches]);

            // --- GRÁFICOS ---
            useEffect(() => {
                if (loggedUser && (activeTab === 'dashboard' || activeTab === 'finanzas')) {
                    const canvasId = activeTab === 'dashboard' ? 'dashChart' : 'financeChart';
                    const ctx = document.getElementById(canvasId);
                    if (ctx) {
                        const chartStatus = Chart.getChart(canvasId);
                        if (chartStatus) chartStatus.destroy();

                        new Chart(ctx, {
                            type: activeTab === 'dashboard' ? 'doughnut' : 'bar',
                            data: {
                                labels: Object.keys(stats.byBranch),
                                datasets: [{
                                    label: 'Monto RD$',
                                    data: Object.values(stats.byBranch),
                                    backgroundColor: ['#2563eb', '#10b981', '#f59e0b', '#6366f1', '#f43f5e', '#ef4444'],
                                    borderWidth: 0,
                                    borderRadius: activeTab === 'finanzas' ? 12 : 0
                                }]
                            },
                            options: { 
                                maintainAspectRatio: false, 
                                plugins: { 
                                    legend: { 
                                        position: 'bottom', 
                                        display: activeTab === 'dashboard',
                                        labels: { font: { weight: 'bold', size: 10 } }
                                    } 
                                },
                                scales: activeTab === 'finanzas' ? {
                                    y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                                    x: { grid: { display: false } }
                                } : {}
                            }
                        });
                    }
                }
            }, [activeTab, loggedUser, stats]);

            const triggerWA = (type, data) => {
                let msg = type === 'renovacion' 
                    ? `Hola ${data.client}, su póliza de ${data.branch} vence el ${data.expiry}. ¿Desea renovar con Fpimentel Seguros?`
                    : `¡Hola ${data.name}! Un gusto saludarte de Fpimentel Seguros.`;
                window.open(`https://wa.me/${data.phone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const handleNewRecord = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                if (modalType === 'policy') {
                    setPolicies([...policies, { id: Date.now(), client: fd.get('client'), branch: fd.get('branch'), premium: parseFloat(fd.get('premium')), expiry: fd.get('expiry'), phone: fd.get('phone'), freq: fd.get('freq'), agent: loggedUser.username }]);
                } else if (modalType === 'lead') {
                    setLeads([...leads, { id: Date.now(), name: fd.get('client'), branch: fd.get('branch'), phone: fd.get('phone'), status: 'Nuevo', date: new Date().toLocaleDateString() }]);
                }
                setShowModal(false);
            };

            if (!loggedUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-t-[15px] border-t-blue-600 animate-in">
                            <Logo className="h-24 mx-auto mb-6" />
                            <h1 className="text-3xl font-black italic tracking-tighter text-slate-800 uppercase mb-8 leading-none">Fpimentel CRM</h1>
                            <div className="space-y-4">
                                <div className="text-left space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 italic">Usuario Administrador</label>
                                    <input id="u_log" placeholder="Eduardog" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-sm focus:ring-8 focus:ring-blue-50 transition-all uppercase" />
                                </div>
                                <div className="text-left space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 italic">Clave de Acceso</label>
                                    <input id="p_log" type="password" placeholder="••••••" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-sm focus:ring-8 focus:ring-blue-50 transition-all" />
                                </div>
                                <button onClick={() => {
                                    const user = users.find(x => x.username.toLowerCase() === document.getElementById('u_log').value.toLowerCase() && x.pass === document.getElementById('p_log').value);
                                    if (user) setLoggedUser(user); else alert("Acceso denegado: Datos incorrectos");
                                }} className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black uppercase tracking-widest hover:bg-blue-700 shadow-2xl active:scale-95 transition-all mt-6">ENTRAR AL SISTEMA</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden text-left font-sans">
                    {/* Sidebar NAVEGACIÓN */}
                    <aside className="w-72 glass-sidebar text-white flex flex-col p-8 shrink-0 shadow-2xl relative z-50">
                        <div className="text-center mb-12 border-b border-white/5 pb-10">
                            <Logo className="h-16 mx-auto filter invert brightness-0 mb-4" />
                        </div>
                        <nav className="flex-1 space-y-1.5 uppercase text-[10px] font-black tracking-[0.2em]">
                            {[
                                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                                { id: 'leads', icon: 'users', label: 'Leads' },
                                { id: 'pipeline', icon: 'trending-up', label: 'Pipeline' },
                                { id: 'cartera', icon: 'briefcase', label: 'Cartera' },
                                { id: 'finanzas', icon: 'dollar-sign', label: 'Finanzas' },
                                { id: 'config', icon: 'settings', label: 'Ajustes' }
                            ].map(item => (
                                <button key={item.id} onClick={()=>setActiveTab(item.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab===item.id?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                    <i data-lucide={item.icon} className="w-5 h-5"></i> <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto p-5 bg-white/5 rounded-3xl border border-white/10 flex items-center gap-4 shadow-inner">
                            <div className="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center font-black italic text-white shadow-xl uppercase">{loggedUser.avatar}</div>
                            <div className="flex-1 overflow-hidden">
                                <p className="text-[10px] font-black truncate uppercase tracking-tighter leading-none">{loggedUser.name}</p>
                                <p className="text-[8px] text-blue-400 font-bold uppercase mt-1 italic tracking-widest">{loggedUser.role}</p>
                            </div>
                            <button onClick={()=>setLoggedUser(null)} className="text-slate-500 hover:text-rose-500 transition-all"><i data-lucide="log-out" className="w-5 h-5"></i></button>
                        </div>
                    </aside>

                    <main className="flex-1 p-10 overflow-y-auto custom-scrollbar bg-slate-50">
                        <header className="mb-10 flex justify-between items-end border-b pb-8 border-slate-200 animate-in">
                            <div className="text-left">
                                <h1 className="text-5xl font-black italic tracking-tighter uppercase text-slate-800 leading-none">
                                    {activeTab === 'dashboard' ? 'Dirección Ejecutiva' : activeTab.toUpperCase()}
                                </h1>
                                <p className="text-slate-400 font-bold uppercase text-[11px] tracking-[0.4em] mt-4 italic flex items-center">
                                    <i data-lucide="shield-check" className="w-4 h-4 mr-2 text-blue-600"></i> FPIMENTEL SEGUROS | {new Date().toLocaleDateString('es-DO', { weekday: 'long', day: 'numeric', month: 'long' })}
                                </p>
                            </div>
                            <button onClick={() => setShowModal(true)} className="bg-slate-900 text-white px-10 py-5 rounded-[1.5rem] font-black flex items-center gap-4 shadow-2xl hover:bg-blue-600 transition-all text-xs tracking-[0.2em] group border-b-4 border-blue-800 active:translate-y-1 active:border-b-0">
                                <i data-lucide="plus-circle" className="w-5 h-5 group-hover:rotate-90 transition-all"></i> NUEVO REGISTRO
                            </button>
                        </header>

                        {/* --- DASHBOARD --- */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-12 animate-in text-left">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                                    <div className="bg-white p-8 rounded-[2rem] border-l-[10px] border-l-blue-600 shadow-xl"><p className="text-[10px] font-black text-slate-400 uppercase mb-2 italic">Pólizas Activas</p><p className="text-6xl font-black tracking-tighter italic leading-none">{policies.length}</p></div>
                                    <div className="bg-white p-8 rounded-[2rem] border-l-[10px] border-l-rose-500 shadow-xl"><p className="text-[10px] font-black text-slate-400 uppercase mb-2 italic">Vencimientos</p><p className="text-6xl font-black tracking-tighter text-rose-600 italic leading-none">1</p></div>
                                    <div className="bg-[#0f172a] p-8 rounded-[2rem] border-l-[10px] border-l-blue-400 shadow-2xl text-white"><p className="text-[10px] font-black text-blue-300 uppercase mb-2 italic text-blue-400">Mensualidad RD$</p><p className="text-5xl font-black tracking-tighter italic font-mono text-emerald-400 leading-none">${stats.breakdown.Mensual.toLocaleString(undefined, {minimumFractionDigits: 0})}</p></div>
                                    <div className="bg-white p-8 rounded-[2rem] border-l-[10px] border-l-emerald-500 shadow-xl"><p className="text-[10px] font-black text-slate-400 uppercase mb-2 italic">Cartera Anual</p><p className="text-4xl font-black text-slate-800 italic font-mono leading-none">${stats.breakdown.Total.toLocaleString(undefined, {minimumFractionDigits: 0})}</p></div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                                    <div className="lg:col-span-2 bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-100 overflow-hidden relative">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full blur-3xl -mr-16 -mt-16 opacity-50"></div>
                                        <h3 className="font-black italic uppercase tracking-widest text-lg mb-10 text-slate-800 flex justify-between items-center border-b pb-6">
                                            <span>Ranking: Top 5 Comisiones</span>
                                            <i data-lucide="award" className="text-amber-500 w-8 h-8"></i>
                                        </h3>
                                        <div className="space-y-6">
                                            {stats.top5.map((p, i) => (
                                                <div key={i} className="flex items-center justify-between p-6 bg-slate-50 rounded-3xl hover:bg-white hover:shadow-2xl hover:border-blue-200 border-2 border-transparent transition-all group cursor-pointer">
                                                    <div className="flex items-center gap-8">
                                                        <span className="text-3xl font-black italic text-slate-200 group-hover:text-blue-600 transition-colors">#0{i+1}</span>
                                                        <div>
                                                            <p className="font-black text-slate-800 uppercase italic text-lg leading-none mb-1">{p.client}</p>
                                                            <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em]">{p.branch} • Humano {p.rate}%</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="font-black text-emerald-600 font-mono text-2xl leading-none italic mb-1">$RD {p.commValue.toLocaleString()}</p>
                                                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Liquidación Anual</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-100 text-center flex flex-col justify-center">
                                        <h3 className="font-black italic uppercase tracking-widest text-xs mb-10 text-slate-400">Mix de Cartera Activa</h3>
                                        <div className="chart-container"><canvas id="dashChart"></canvas></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- FINANZAS (Gráficos) --- */}
                        {activeTab === 'finanzas' && (
                            <div className="space-y-12 animate-in text-left">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl border-t-[12px] border-t-blue-600">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 italic underline decoration-blue-200 underline-offset-8">Comisión Mensual</p>
                                        <p className="text-6xl font-black italic tracking-tighter text-blue-600 font-mono leading-none">$RD {stats.breakdown.Mensual.toLocaleString(undefined, {minimumFractionDigits:0})}</p>
                                    </div>
                                    <div className="bg-[#0f172a] p-12 rounded-[3rem] shadow-2xl text-white border-t-[12px] border-t-emerald-500">
                                        <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-3 italic underline decoration-emerald-900 underline-offset-8">Cartera Anual Total</p>
                                        <p className="text-6xl font-black italic tracking-tighter font-mono text-white leading-none">$RD {stats.breakdown.Total.toLocaleString(undefined, {minimumFractionDigits:0})}</p>
                                    </div>
                                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-100 flex flex-col justify-center relative overflow-hidden">
                                        <h3 className="font-black italic uppercase tracking-widest text-[10px] mb-8 text-slate-400 text-center uppercase">Volumen por Ramo</h3>
                                        <div className="chart-container"><canvas id="financeChart"></canvas></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- LEADS --- */}
                        {activeTab === 'leads' && (
                            <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden animate-in border border-slate-100 text-left">
                                <div className="p-10 border-b bg-slate-50/50 flex justify-between items-center italic">
                                    <h3 className="font-black italic uppercase tracking-widest text-2xl text-slate-800">Oportunidades de Venta</h3>
                                    <span className="bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-black uppercase italic shadow-2xl">{leads.length} prospectos</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[11px] font-black text-slate-400 uppercase tracking-[0.4em]">
                                            <tr><th className="p-10 text-center">Prospecto</th><th className="p-10 text-center">Interés</th><th className="p-10 text-center">Estado</th><th className="p-10 text-right">Contacto</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm italic">
                                            {leads.map(l => (
                                                <tr key={l.id} className="hover:bg-blue-50/20 transition-all group">
                                                    <td className="p-10 font-black text-slate-800 uppercase italic text-lg leading-none">
                                                        {l.name}
                                                        <p className="text-[10px] text-slate-300 font-bold mt-2 not-italic uppercase tracking-widest">Desde: {l.date}</p>
                                                    </td>
                                                    <td className="p-10 text-center"><span className="bg-blue-50 text-blue-600 px-5 py-2 rounded-full text-[10px] font-black uppercase italic shadow-sm">{l.branch}</span></td>
                                                    <td className="p-10 text-center">
                                                        <span className={`px-5 py-2 rounded-full text-[10px] font-black uppercase italic ${l.status==='Perdido'?'bg-rose-100 text-rose-500':'bg-amber-100 text-amber-600'}`}>{l.status}</span>
                                                    </td>
                                                    <td className="p-10 text-right">
                                                        <button onClick={()=>triggerWA('lead', l)} className="bg-emerald-50 text-emerald-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-600 hover:text-white transition-all shadow-md italic flex items-center gap-3 ml-auto transform active:scale-95">
                                                            <i data-lucide="message-circle" className="w-4 h-4"></i> WhatsApp
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* --- PIPELINE CON PERDIDOS --- */}
                        {activeTab === 'pipeline' && (
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8 animate-in text-left">
                                {["Nuevos", "Propuesta", "Ganados", "Perdidos"].map((status) => (
                                    <div key={status} className="flex flex-col gap-8">
                                        <h4 className={`font-black italic uppercase tracking-[0.3em] text-xs px-6 py-3 rounded-2xl flex justify-between shadow-inner ${status==='Perdidos'?'bg-rose-50 text-rose-500':'bg-slate-100 text-slate-400'}`}>
                                            <span>{status}</span>
                                            <span className="font-bold">{leads.filter(l=> (status === 'Nuevos' && l.status === 'Nuevo') || (status === 'Propuesta' && l.status === 'Propuesta') || (l.status === status)).length}</span>
                                        </h4>
                                        <div className="kanban-col custom-scrollbar overflow-y-auto border-t-8 border-t-blue-500/10">
                                            {leads.filter(l => (status === 'Nuevos' && l.status === 'Nuevo') || (status === 'Propuesta' && l.status === 'Propuesta') || (l.status === status)).map(l => (
                                                <div key={l.id} className={`bg-white p-8 rounded-[2.5rem] shadow-xl border-b-8 mb-6 hover:border-blue-500 transition-all group cursor-move ${status==='Perdidos'?'border-rose-300':'border-slate-100'}`}>
                                                    <p className="font-black text-slate-800 text-base italic uppercase mb-2 leading-tight">{l.name}</p>
                                                    <p className="text-[11px] font-bold text-blue-600 uppercase tracking-widest mb-6 italic underline underline-offset-4 decoration-blue-100">{l.branch}</p>
                                                    <div className="flex gap-3">
                                                        <button onClick={()=>triggerWA('lead', l)} className="flex-1 bg-emerald-50 text-emerald-600 py-3 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-emerald-600 hover:text-white transition-all shadow-md italic">WA</button>
                                                        <button className="bg-slate-50 text-slate-400 p-3 rounded-2xl hover:bg-slate-900 hover:text-white transition-all"><i data-lucide="more-horizontal" className="w-5 h-5"></i></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- AJUSTES (ESTABLE) --- */}
                        {activeTab === 'config' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 animate-in text-left">
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-100">
                                    <h3 className="font-black italic uppercase tracking-widest text-xl mb-10 border-b pb-8 text-blue-600 flex justify-between items-center italic">
                                        <span>Ramos Humano Seguros</span>
                                        <i data-lucide="percent" className="text-blue-200 w-10 h-10"></i>
                                    </h3>
                                    <div className="space-y-4 mb-12 max-h-[400px] overflow-y-auto pr-6 custom-scrollbar">
                                        {branches && branches.map((b, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-6 bg-slate-50 rounded-3xl group border-2 border-transparent hover:border-blue-500 hover:bg-white transition-all">
                                                <span className="text-[11px] font-black uppercase tracking-widest text-slate-700 italic">{b.name}</span>
                                                <div className="flex items-center gap-3">
                                                    <input value={b.commission} type="number" step="0.1" className="w-20 p-3 rounded-2xl text-center font-black text-blue-600 text-lg bg-white border-2 border-slate-100 outline-none shadow-inner transition-all focus:ring-8 focus:ring-blue-50" 
                                                        onChange={(e) => {
                                                            const val = parseFloat(e.target.value) || 0;
                                                            setBranches(branches.map((item, i) => i === idx ? { ...item, commission: val } : item));
                                                        }} 
                                                    />
                                                    <span className="text-xs font-black text-slate-300">%</span>
                                                    <button onClick={()=>setBranches(branches.filter((_, i) => i !== idx))} className="text-slate-200 hover:text-rose-500 ml-4 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <form onSubmit={(e)=>{
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        const bname = fd.get('b_name');
                                        const bcomm = parseFloat(fd.get('b_comm'));
                                        if(bname && !isNaN(bcomm)) {
                                            setBranches([...branches, { name: bname, commission: bcomm }]);
                                            e.target.reset();
                                        }
                                    }} className="space-y-6 pt-10 border-t border-dashed">
                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 italic text-center">Registrar Nuevo Ramo</p>
                                        <div className="grid grid-cols-2 gap-6">
                                            <input name="b_name" required placeholder="Nombre (Ej: Vida)" className="p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-black uppercase outline-none focus:ring-8 focus:ring-blue-50 transition-all" />
                                            <input name="b_comm" type="number" step="0.1" required placeholder="% Comisión" className="p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-black outline-none focus:ring-8 focus:ring-blue-50 transition-all" />
                                        </div>
                                        <button type="submit" className="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase text-xs tracking-widest hover:bg-blue-600 transition-all shadow-2xl active:translate-y-1">ACTUALIZAR TARIFARIO</button>
                                    </form>
                                </div>

                                <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-100 text-left">
                                    <h3 className="font-black italic uppercase tracking-widest text-xl mb-10 border-b pb-8 text-emerald-600 flex justify-between items-center italic">
                                        <span>Accesos del Equipo</span>
                                        <i data-lucide="user-cog" className="text-emerald-100 w-10 h-10"></i>
                                    </h3>
                                    <div className="space-y-6 mb-12 max-h-[400px] overflow-y-auto pr-6 custom-scrollbar">
                                        {users && users.map((u, i) => (
                                            <div key={i} className="flex items-center justify-between p-6 bg-slate-50 rounded-[2.5rem] group border-2 border-transparent hover:border-emerald-100 hover:bg-white transition-all">
                                                <div className="flex items-center gap-6 text-left leading-none">
                                                    <div className="w-14 h-14 bg-slate-950 flex items-center justify-center text-white font-black italic rounded-3xl shadow-xl uppercase text-xl border-4 border-slate-200">{u.avatar}</div>
                                                    <div>
                                                        <p className="font-black text-slate-800 text-lg uppercase italic mb-1 leading-none">{u.name}</p>
                                                        <p className="text-[10px] font-black text-emerald-500 uppercase tracking-widest italic leading-none">{u.role}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => u.id !== 'u1' && setUsers(users.filter(x => x.id !== u.id))} className={`text-slate-200 ${u.id==='u1'?'opacity-0':'hover:text-rose-500 opacity-0 group-hover:opacity-100'} transition-all`}><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                    <form onSubmit={(e)=>{
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        const uname = fd.get('u_name');
                                        const ulog = fd.get('u_log');
                                        const upass = fd.get('u_pass');
                                        if(uname && ulog && upass) {
                                            setUsers([...users, { id: 'u'+Date.now(), username: ulog, name: uname, role: fd.get('u_role'), avatar: uname.charAt(0).toUpperCase(), pass: upass }]);
                                            e.target.reset();
                                        }
                                    }} className="space-y-6 pt-10 border-t border-dashed text-left leading-none">
                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 italic text-center">Registrar Nuevo Colaborador</p>
                                        <input name="u_name" required placeholder="Nombre Completo" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-black uppercase outline-none focus:ring-8 focus:ring-emerald-50 transition-all shadow-sm" />
                                        <div className="grid grid-cols-2 gap-6">
                                            <input name="u_log" required placeholder="ID Usuario" className="p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-black outline-none focus:ring-8 focus:ring-emerald-50 transition-all shadow-sm" />
                                            <select name="u_role" className="p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-[10px] font-black uppercase outline-none italic transition-all shadow-sm">
                                                <option>Ejecutiva</option>
                                                <option>Gerente</option>
                                                <option>Admin</option>
                                            </select>
                                        </div>
                                        <input name="u_pass" type="password" required placeholder="Clave Temporal" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-black outline-none focus:ring-8 focus:ring-emerald-50 transition-all shadow-sm" />
                                        <button type="submit" className="w-full bg-emerald-600 text-white py-6 rounded-3xl font-black uppercase text-xs tracking-widest shadow-2xl shadow-emerald-500/20 active:translate-y-1 transition-all">HABILITAR ACCESO</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* --- CARTERA (Con Comisiones Detalladas) --- */}
                        {activeTab === 'cartera' && (
                            <div className="bg-white rounded-[3.5rem] shadow-2xl overflow-hidden animate-in border border-slate-100 text-left">
                                <div className="p-12 border-b bg-slate-900 text-white flex justify-between items-center italic">
                                    <h3 className="font-black italic uppercase tracking-widest text-2xl">Inventario en Vigor</h3>
                                    <span className="bg-blue-600 text-white px-8 py-3 rounded-full text-xs font-black uppercase italic shadow-2xl">{policies.length} pólizas</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[11px] font-black text-slate-400 uppercase tracking-[0.4em]">
                                            <tr>
                                                <th className="p-10">Asegurado</th>
                                                <th className="p-10 text-center">Ramo</th>
                                                <th className="p-10 text-center">Prima ($RD)</th>
                                                <th className="p-10 text-center">% Com.</th>
                                                <th className="p-10 text-right">Comisión ($RD)</th>
                                                <th className="p-10 text-right">Acción</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm italic">
                                            {policies.map(p => {
                                                const rate = branches.find(b => b.name === p.branch)?.commission || 10;
                                                const comm = (p.premium * rate) / 100;
                                                return (
                                                    <tr key={p.id} className="hover:bg-blue-50/30 transition-all group">
                                                        <td className="p-10 font-black text-slate-800 uppercase italic text-lg leading-none">
                                                            {p.client}
                                                            <p className="text-[10px] text-slate-300 font-bold mt-2 not-italic uppercase tracking-widest leading-none italic">{p.phone}</p>
                                                        </td>
                                                        <td className="p-10 text-center"><span className="bg-blue-50 text-blue-600 px-6 py-2 rounded-full text-[10px] font-black uppercase italic shadow-sm">{p.branch}</span></td>
                                                        <td className="p-10 text-center font-mono font-black text-slate-800 italic text-lg leading-none tracking-tighter">${p.premium.toLocaleString()}</td>
                                                        <td className="p-10 text-center font-black text-blue-500 italic uppercase leading-none">{rate}%</td>
                                                        <td className="p-10 text-right font-black text-emerald-600 font-mono italic text-lg leading-none tracking-tighter">${comm.toLocaleString()}</td>
                                                        <td className="p-10 text-right">
                                                            <button onClick={()=>triggerWA('renovacion', p)} className="bg-rose-50 text-rose-500 p-4 rounded-3xl hover:bg-rose-600 hover:text-white transition-all shadow-xl active:scale-95">
                                                                <i data-lucide="refresh-cw" className="w-5 h-5"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
