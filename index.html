<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fpimentel Seguros CRM</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)"></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap](https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap)');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#0F172A]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        function App() {
            const [logged, setLogged] = useState(false);
            const [user, setUser] = useState("");
            if (!logged) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#0F172A]">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
                            <img src="[https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png](https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png)" className="h-20 mx-auto mb-6" />
                            <h1 className="text-2xl font-black italic mb-2 tracking-tighter">FPIMENTEL SEGUROS</h1>
                            <p className="text-slate-400 text-xs mb-8 uppercase tracking-widest font-bold font-sans">Acceso de Colaboradores</p>
                            <input onChange={(e)=>setUser(e.target.value)} placeholder="Usuario" className="w-full p-4 bg-slate-50 rounded-2xl mb-4 border outline-none font-bold" />
                            <input type="password" placeholder="Clave" className="w-full p-4 bg-slate-50 rounded-2xl mb-6 border outline-none font-bold" />
                            <button onClick={()=>setLogged(true)} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700">Entrar al CRM</button>
                        </div>
                    </div>
                );
            }
            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden text-slate-800">
                    <div className="w-64 bg-[#0F172A] text-white p-8 flex flex-col shrink-0 shadow-2xl">
                        <div className="text-center mb-12">
                            <h2 className="text-xl font-black italic text-blue-400 tracking-widest leading-none">FPIMENTEL</h2>
                            <p className="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2">Seguros & Fianzas</p>
                        </div>
                        <div className="flex-1 space-y-4 font-sans uppercase text-[10px] tracking-widest font-black">
                            <div className="p-4 bg-blue-600 rounded-2xl shadow-lg italic cursor-pointer">🏠 Dashboard</div>
                            <div className="p-4 bg-white/5 rounded-2xl text-slate-400 cursor-pointer">📄 Cartera</div>
                            <div className="p-4 bg-white/5 rounded-2xl text-slate-400 cursor-pointer">✅ Tareas</div>
                        </div>
                        <div className="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10 flex items-center space-x-3 italic uppercase text-[10px] font-black tracking-widest">
                           <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">{user[0] || 'U'}</div>
                           <span>{user || 'Usuario'}</span>
                        </div>
                    </div>
                    <main className="flex-1 p-12 overflow-y-auto font-sans">
                        <h1 className="text-4xl font-black italic tracking-tighter uppercase mb-2">¡Bienvenido al Sistema!</h1>
                        <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] italic mb-12">Resumen Operativo Fpimentel Seguros</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                            <div className="bg-white p-10 rounded-[2.5rem] border-l-[12px] border-blue-600 shadow-xl">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Pólizas Activas</p>
                                <p className="text-6xl font-black tracking-tighter italic">24</p>
                            </div>
                            <div className="bg-[#0F172A] p-10 rounded-[2.5rem] border-l-[12px] border-emerald-500 shadow-xl text-white">
                                <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2 italic text-emerald-400">Status Oficina</p>
                                <p className="text-3xl font-black italic tracking-tighter uppercase leading-none">Eduardo, Don Fernando y Sandra</p>
                                <div className="mt-4 flex items-center space-x-2 text-emerald-400 font-black text-xs uppercase tracking-widest">
                                    <span className="h-2 w-2 bg-emerald-400 rounded-full animate-pulse"></span>
                                    <span>CONECTADOS</span>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
