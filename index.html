<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fpimentel Seguros CRM - Executive Edition</title>
    <!-- Chosen Palette: Navy Executive (Slate 950, Royal Blue 600, Success Emerald 500, Alert Amber 500, Rose 500) -->
    <!-- Application Structure Plan: 
        1. Unified State: Centralized React state for consistent data flow across Dashboard, Leads, Pipeline, and Finances.
        2. Dashboard: Redesigned with 'Top Commissions' rankings and high-visibility KPIs.
        3. Sales Funnel: Full Pipeline implementation including 'Lost' (Perdidos) column.
        4. Financial Intelligence: Using Chart.js to visualize revenue streams and branch performance.
        5. Admin Control: Robust configuration panel with safe error handling to prevent UI crashes.
    -->
    <!-- Visualization & Content Choices: 
        - Performance: Bar chart for 'Commissions by Branch' in Finance tab.
        - Strategic Insight: Doughnut chart on Dashboard for branch distribution.
        - Urgency: Highlighted table for upcoming renewals.
        - Personalization: Inclusion of family names in mock data for immediate context.
        CONFIRMATION: No SVG/Mermaid used. Lucide icons via CDN.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-sidebar { background: #0f172a; }
        .chart-container { position: relative; width: 100%; max-height: 280px; margin: auto; }
        .kanban-col { min-height: 500px; background: rgba(241, 245, 249, 0.4); border: 2px dashed #e2e8f0; border-radius: 2rem; padding: 1.5rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root">
        <div class="h-screen flex items-center justify-center bg-slate-950 text-white">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                <p class="font-black uppercase tracking-widest text-xs opacity-50">Sincronizando Fpimentel Seguros...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- COMPONENTE LOGO ---
        const Logo = ({ className = "h-12", textVisible = true }) => {
            const [imgError, setImgError] = useState(false);
            return (
                <div className="flex flex-col items-center gap-2">
                    {!imgError ? (
                        <img 
                            src="https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png" 
                            className={className}
                            onError={() => setImgError(true)}
                        />
                    ) : (
                        <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">F</div>
                    )}
                    {textVisible && <span className="text-blue-400 font-black tracking-widest text-[10px] uppercase italic">Fpimentel Seguros</span>}
                </div>
            );
        };

        const App = () => {
            const [loggedUser, setLoggedUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('policy'); 

            // --- DATOS MAESTROS ---
            const [users, setUsers] = useState([
                { id: 'u1', username: 'Eduardog', name: 'Eduardo G.', role: 'Admin', avatar: 'E', pass: '123456' }
            ]);

            const [branches, setBranches] = useState([
                { name: "Automóvil", commission: 17.5 },
                { name: "Fianzas", commission: 12.5 },
                { name: "Salud", commission: 12.0 },
                { name: "Hogar", commission: 10.5 },
                { name: "PYME", commission: 10.5 }
            ]);

            const [contacts, setContacts] = useState([
                { id: 1, name: "Vanessa Marie Pimentel", phone: "8090001111", email: "vanessa@mail.com", notes: "Contacto VIP - Novia" },
                { id: 2, name: "Andrés Pimentel", phone: "8094763535", email: "andres@mail.com", notes: "Papá" }
            ]);

            const [leads, setLeads] = useState([
                { id: 1, name: "Andrés Pimentel", status: "Nuevo", branch: "Automóvil", phone: "8094763535", date: "2024-05-11" },
                { id: 2, name: "Corporativo X", status: "Propuesta", branch: "PYME", phone: "8295551234", date: "2024-05-10" },
                { id: 3, name: "Cliente Antiguo", status: "Perdido", branch: "Salud", phone: "8091112222", date: "2024-05-01" }
            ]);

            const [policies, setPolicies] = useState([
                { id: 101, client: "Don Fernando Pimentel", branch: "Multiriesgo", premium: 125000, expiry: "2024-06-15", agent: "Eduardog", phone: "8095550000", freq: 'Anual' },
                { id: 102, client: "Andrés Pimentel", branch: "Automóvil", premium: 18500, expiry: "2024-12-20", agent: "Eduardog", phone: "8094763535", freq: 'Mensual' },
                { id: 103, client: "Vanessa Marie", branch: "Salud", premium: 4500, expiry: "2025-01-10", agent: "Eduardog", phone: "8090001111", freq: 'Mensual' }
            ]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // --- ESTADÍSTICAS ---
            const stats = useMemo(() => {
                const breakdown = { Mensual: 0, Trimestral: 0, Anual: 0, Total: 0 };
                const byBranch = {};
                
                policies.forEach(p => {
                    const rate = branches.find(b => b.name === p.branch)?.commission || 10;
                    const comm = (p.premium * rate) / 100;
                    
                    if (p.freq === 'Mensual') breakdown.Mensual += (comm / 12);
                    else if (p.freq === 'Trimestral') breakdown.Trimestral += (comm / 4);
                    else breakdown.Anual += comm;
                    
                    breakdown.Total += comm;
                    byBranch[p.branch] = (byBranch[p.branch] || 0) + comm;
                });
                
                const top5 = [...policies]
                    .map(p => ({ 
                        ...p, 
                        commValue: (p.premium * (branches.find(b => b.name === p.branch)?.commission || 10)) / 100 
                    }))
                    .sort((a, b) => b.commValue - a.commValue)
                    .slice(0, 5);

                return { breakdown, byBranch, top5 };
            }, [policies, branches]);

            // --- GRÁFICOS ---
            useEffect(() => {
                if (loggedUser && (activeTab === 'dashboard' || activeTab === 'finanzas')) {
                    const canvasId = activeTab === 'dashboard' ? 'dashChart' : 'financeChart';
                    const ctx = document.getElementById(canvasId);
                    if (ctx) {
                        // Limpiar gráficos previos para evitar solapamientos
                        const chartStatus = Chart.getChart(canvasId);
                        if (chartStatus) chartStatus.destroy();

                        new Chart(ctx, {
                            type: activeTab === 'dashboard' ? 'doughnut' : 'bar',
                            data: {
                                labels: Object.keys(stats.byBranch),
                                datasets: [{
                                    label: 'Comisiones RD$',
                                    data: Object.values(stats.byBranch),
                                    backgroundColor: ['#2563eb', '#10b981', '#f59e0b', '#6366f1', '#f43f5e'],
                                    borderWidth: 0,
                                    borderRadius: 10
                                }]
                            },
                            options: { 
                                maintainAspectRatio: false, 
                                plugins: { 
                                    legend: { 
                                        position: activeTab === 'dashboard' ? 'bottom' : 'top',
                                        display: activeTab === 'dashboard'
                                    } 
                                },
                                scales: activeTab === 'finanzas' ? {
                                    y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                                    x: { grid: { display: false } }
                                } : {}
                            }
                        });
                    }
                }
            }, [activeTab, loggedUser, stats]);

            const triggerWA = (type, data) => {
                let msg = type === 'renovacion' 
                    ? `Hola ${data.client}, su póliza de ${data.branch} vence el ${data.expiry}. ¿Desea renovar con Fpimentel Seguros?`
                    : `¡Hola ${data.name}! Un gusto saludarte de Fpimentel Seguros. ¿Cómo podemos ayudarte hoy?`;
                window.open(`https://wa.me/${data.phone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const handleNewRecord = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                if (modalType === 'policy') {
                    setPolicies([...policies, { id: Date.now(), client: fd.get('client'), branch: fd.get('branch'), premium: parseFloat(fd.get('premium')), expiry: fd.get('expiry'), phone: fd.get('phone'), freq: fd.get('freq'), agent: loggedUser.username }]);
                } else if (modalType === 'lead') {
                    setLeads([...leads, { id: Date.now(), name: fd.get('client'), branch: fd.get('branch'), phone: fd.get('phone'), status: 'Nuevo', date: new Date().toLocaleDateString() }]);
                } else if (modalType === 'contact') {
                    setContacts([...contacts, { id: Date.now(), name: fd.get('client'), phone: fd.get('phone'), email: fd.get('email') || '', notes: fd.get('notes') || '' }]);
                }
                setShowModal(false);
            };

            if (!loggedUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-sans">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-t-[12px] border-blue-600 animate-in">
                            <Logo className="h-20 mx-auto mb-6" />
                            <h1 className="text-2xl font-black italic tracking-tighter text-slate-800 uppercase mb-8 leading-none">Fpimentel CRM</h1>
                            <div className="space-y-4">
                                <input id="u_log" placeholder="Usuario" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 uppercase transition-all" />
                                <input id="p_log" type="password" placeholder="Contraseña" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 transition-all" />
                                <button onClick={() => {
                                    const user = users.find(x => x.username.toLowerCase() === document.getElementById('u_log').value.toLowerCase() && x.pass === document.getElementById('p_log').value);
                                    if (user) setLoggedUser(user); else alert("Error de Acceso: Verifica usuario y clave");
                                }} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 shadow-xl active:scale-95 transition-all">ACCEDER AL PANEL</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden text-left">
                    {/* Sidebar Sidebar */}
                    <aside className="w-72 glass-sidebar text-white flex flex-col p-8 shrink-0 shadow-2xl relative z-50">
                        <div className="text-center mb-12 border-b border-white/5 pb-8">
                            <Logo className="h-16 mx-auto filter invert brightness-0 mb-4" />
                        </div>
                        <nav className="flex-1 space-y-1.5 uppercase text-[10px] font-black tracking-[0.2em]">
                            {[
                                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                                { id: 'contacts', icon: 'contact-2', label: 'Contactos' },
                                { id: 'leads', icon: 'users', label: 'Leads' },
                                { id: 'pipeline', icon: 'trending-up', label: 'Pipeline' },
                                { id: 'cartera', icon: 'briefcase', label: 'Cartera' },
                                { id: 'finanzas', icon: 'dollar-sign', label: 'Finanzas' },
                                { id: 'config', icon: 'settings', label: 'Ajustes' }
                            ].map(item => (
                                <button key={item.id} onClick={()=>setActiveTab(item.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab===item.id?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                    <i data-lucide={item.icon} className="w-5 h-5"></i> <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10 flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-black italic text-white shadow-lg uppercase">{loggedUser.avatar}</div>
                            <div className="flex-1 overflow-hidden text-left">
                                <p className="text-[10px] font-black truncate uppercase tracking-tighter leading-none">{loggedUser.name}</p>
                                <p className="text-[8px] text-blue-400 font-bold uppercase mt-1 italic">{loggedUser.role}</p>
                            </div>
                            <button onClick={()=>setLoggedUser(null)} className="text-slate-500 hover:text-rose-500 transition-all"><i data-lucide="log-out" className="w-4 h-4"></i></button>
                        </div>
                    </aside>

                    <main className="flex-1 p-10 overflow-y-auto custom-scrollbar bg-slate-50">
                        <header className="mb-10 flex justify-between items-end border-b pb-8 border-slate-200 animate-in">
                            <div className="text-left">
                                <h1 className="text-4xl font-black italic tracking-tighter uppercase text-slate-800 leading-none">
                                    {activeTab === 'dashboard' ? 'Métricas Globales' : activeTab === 'finanzas' ? 'Análisis de Comisiones' : activeTab.toUpperCase()}
                                </h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] mt-3 italic flex items-center">
                                    <i data-lucide="shield-check" className="w-3 h-3 mr-2 text-blue-600"></i> Fpimentel Seguros | {new Date().toLocaleDateString('es-DO', { weekday: 'long', day: 'numeric', month: 'long' })}
                                </p>
                            </div>
                            <button onClick={() => setShowModal(true)} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-3 shadow-2xl hover:bg-blue-600 transition-all text-[10px] tracking-[0.2em] group">
                                <i data-lucide="plus-circle" className="w-4 h-4 group-hover:rotate-90 transition-all"></i> NUEVO REGISTRO
                            </button>
                        </header>

                        {/* --- DASHBOARD --- */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-10 animate-in text-left">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <div className="bg-white p-8 rounded-3xl border-l-[8px] border-l-blue-600 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1 italic">Pólizas Activas</p><p className="text-5xl font-black tracking-tighter italic">{policies.length}</p></div>
                                    <div className="bg-white p-8 rounded-3xl border-l-[8px] border-l-amber-500 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1 italic">Contactos</p><p className="text-5xl font-black tracking-tighter italic">{contacts.length}</p></div>
                                    <div className="bg-white p-8 rounded-3xl border-l-[8px] border-l-rose-500 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1 italic">Vencimientos</p><p className="text-5xl font-black tracking-tighter text-rose-600 italic">1</p></div>
                                    <div className="bg-[#0f172a] p-8 rounded-3xl border-l-[8px] border-l-emerald-500 shadow-sm text-white"><p className="text-[10px] font-black text-emerald-400 uppercase mb-1 italic">Mensualidad</p><p className="text-3xl font-black text-emerald-400 italic font-mono leading-none">$RD {stats.breakdown.Mensual.toLocaleString(undefined, {minimumFractionDigits: 2})}</p></div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 bg-white p-10 rounded-[3rem] shadow-xl border overflow-hidden">
                                        <h3 className="font-black italic uppercase tracking-widest text-sm mb-8 text-slate-800 flex justify-between items-center">
                                            <span>Top 5 Mayores Comisiones</span>
                                            <i data-lucide="award" className="text-amber-500"></i>
                                        </h3>
                                        <div className="space-y-4">
                                            {stats.top5.map((p, i) => (
                                                <div key={i} className="flex items-center justify-between p-5 bg-slate-50 rounded-[2rem] hover:bg-blue-50 transition-all border border-transparent hover:border-blue-100 group">
                                                    <div className="flex items-center gap-6">
                                                        <span className="text-2xl font-black italic text-blue-200 group-hover:text-blue-400">#0{i+1}</span>
                                                        <div><p className="font-black text-slate-800 uppercase italic leading-none">{p.client}</p><p className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mt-1">{p.branch}</p></div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="font-black text-emerald-600 font-mono">$RD {p.commValue.toLocaleString()}</p>
                                                        <p className="text-[9px] font-black text-slate-300 uppercase">Proyectado Anual</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[3rem] shadow-xl border text-center flex flex-col justify-center">
                                        <h3 className="font-black italic uppercase tracking-widest text-[10px] mb-8 text-slate-400">Mix de Cartera</h3>
                                        <div className="chart-container"><canvas id="dashChart"></canvas></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- FINANZAS (CON GRAFICOS) --- */}
                        {activeTab === 'finanzas' && (
                            <div className="space-y-10 animate-in text-left">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border-t-8 border-t-blue-500">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Comisión Mensual</p>
                                        <p className="text-5xl font-black italic tracking-tighter text-blue-600 font-mono leading-none">$RD {stats.breakdown.Mensual.toLocaleString(undefined, {minimumFractionDigits:2})}</p>
                                    </div>
                                    <div className="bg-[#0f172a] p-10 rounded-[2.5rem] shadow-xl text-white border-t-8 border-t-emerald-500">
                                        <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-2 italic">Total Anual Gestionado</p>
                                        <p className="text-5xl font-black italic tracking-tighter font-mono text-white leading-none">$RD {stats.breakdown.Total.toLocaleString(undefined, {minimumFractionDigits:2})}</p>
                                    </div>
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 flex flex-col justify-center">
                                        <h3 className="font-black italic uppercase tracking-widest text-[9px] mb-4 text-slate-400 text-center uppercase">Rendimiento por Ramo</h3>
                                        <div className="chart-container"><canvas id="financeChart"></canvas></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- LEADS --- */}
                        {activeTab === 'leads' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden animate-in border border-slate-100 text-left">
                                <div className="p-8 border-b bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="font-black italic tracking-widest uppercase text-lg text-slate-800 italic">Bandeja de Prospectos</h3>
                                    <span className="bg-blue-600 text-white px-5 py-1 rounded-full text-[10px] font-black uppercase italic shadow-lg">{leads.length} prospectos activos</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                                            <tr><th className="p-8">Nombre / Cliente</th><th className="p-8 text-center">Ramo de Interés</th><th className="p-8 text-center">Estado</th><th className="p-8 text-right">Contacto</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm italic">
                                            {leads.map(l => (
                                                <tr key={l.id} className="hover:bg-blue-50/20 transition-all group">
                                                    <td className="p-8 font-black text-slate-800 uppercase italic">
                                                        {l.name}
                                                        <p className="text-[10px] text-slate-400 font-bold mt-1 tracking-tighter not-italic uppercase">Registrado: {l.date}</p>
                                                    </td>
                                                    <td className="p-8 text-center"><span className="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">{l.branch}</span></td>
                                                    <td className="p-8 text-center">
                                                        <span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase ${l.status==='Perdido'?'bg-rose-100 text-rose-500':'bg-amber-100 text-amber-500'}`}>{l.status}</span>
                                                    </td>
                                                    <td className="p-8 text-right">
                                                        <button onClick={()=>triggerWA('lead', l)} className="bg-emerald-50 text-emerald-600 px-5 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest hover:bg-emerald-600 hover:text-white transition-all shadow-sm italic flex items-center gap-2 ml-auto active:scale-95">
                                                            <i data-lucide="message-circle" className="w-4 h-4"></i> WhatsApp
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* --- PIPELINE CON PERDIDOS --- */}
                        {activeTab === 'pipeline' && (
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8 animate-in text-left">
                                {["Nuevos", "Propuesta", "Ganados", "Perdidos"].map((status) => (
                                    <div key={status} className="flex flex-col gap-6">
                                        <h4 className={`font-black italic uppercase tracking-widest text-xs px-4 flex justify-between ${status==='Perdidos'?'text-rose-500':'text-slate-400'}`}>
                                            <span>{status}</span>
                                            <span className="bg-slate-100 px-2 py-0.5 rounded-lg text-[10px]">{leads.filter(l=> (status === 'Nuevos' && l.status === 'Nuevo') || (status === 'Propuesta' && l.status === 'Propuesta') || (l.status === status)).length}</span>
                                        </h4>
                                        <div className="kanban-col custom-scrollbar overflow-y-auto">
                                            {leads.filter(l => (status === 'Nuevos' && l.status === 'Nuevo') || (status === 'Propuesta' && l.status === 'Propuesta') || (l.status === status)).map(l => (
                                                <div key={l.id} className={`bg-white p-6 rounded-3xl shadow-md border-b-4 mb-4 hover:border-blue-500 transition-all group ${status==='Perdidos'?'border-rose-300':'border-slate-100'}`}>
                                                    <p className="font-black text-slate-800 text-sm italic uppercase mb-1 leading-none">{l.name}</p>
                                                    <p className="text-[10px] font-bold text-blue-600 uppercase mb-4">{l.branch}</p>
                                                    <div className="flex gap-2">
                                                        <button onClick={()=>triggerWA('lead', l)} className="flex-1 bg-emerald-50 text-emerald-600 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-emerald-600 hover:text-white transition-all shadow-sm italic active:scale-95">WA</button>
                                                        <button className="bg-slate-50 text-slate-400 p-2.5 rounded-xl hover:text-blue-600 transition-all"><i data-lucide="more-vertical" className="w-4 h-4"></i></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- CONFIGURACION (ESTABLE Y FUNCIONAL) --- */}
                        {activeTab === 'config' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 animate-in text-left">
                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border">
                                    <h3 className="font-black italic uppercase tracking-widest text-lg mb-8 border-b pb-6 text-blue-600 flex justify-between items-center">
                                        <span>Ramos Humano Seguros</span>
                                        <i data-lucide="percent" className="text-blue-100"></i>
                                    </h3>
                                    <div className="space-y-4 mb-10 max-h-[300px] overflow-y-auto pr-4 custom-scrollbar">
                                        {branches.map((b, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl group border border-transparent hover:border-blue-100 transition-all">
                                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-600">{b.name}</span>
                                                <div className="flex items-center gap-2">
                                                    <input value={b.commission} type="number" step="0.1" className="w-16 p-2 rounded-xl text-center font-black text-blue-600 text-xs bg-white border outline-none shadow-inner" 
                                                        onChange={(e) => {
                                                            const val = parseFloat(e.target.value) || 0;
                                                            setBranches(branches.map((item, i) => i === idx ? { ...item, commission: val } : item));
                                                        }} 
                                                    />
                                                    <span className="text-[10px] font-black text-slate-300">%</span>
                                                    <button onClick={()=>setBranches(branches.filter((_, i) => i !== idx))} className="text-slate-300 hover:text-rose-500 ml-2 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <form onSubmit={(e)=>{
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        const bname = fd.get('b_name');
                                        const bcomm = parseFloat(fd.get('b_comm'));
                                        if(bname && !isNaN(bcomm)) {
                                            setBranches([...branches, { name: bname, commission: bcomm }]);
                                            e.target.reset();
                                        }
                                    }} className="space-y-4 pt-6 border-t border-dashed">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Añadir Nuevo Ramo</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="b_name" required placeholder="Nombre (Ej: Viajes)" className="p-4 bg-slate-50 border rounded-2xl text-[10px] font-black uppercase outline-none focus:ring-4 focus:ring-blue-100" />
                                            <input name="b_comm" type="number" step="0.1" required placeholder="% Comisión" className="p-4 bg-slate-50 border rounded-2xl text-[10px] font-black outline-none focus:ring-4 focus:ring-blue-100" />
                                        </div>
                                        <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-blue-600 transition-all shadow-xl">Guardar Ramo</button>
                                    </form>
                                </div>

                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border text-left">
                                    <h3 className="font-black italic uppercase tracking-widest text-lg mb-8 border-b pb-6 text-emerald-600 flex justify-between items-center italic">
                                        <span>Accesos del Equipo</span>
                                        <i data-lucide="user-cog" className="text-emerald-100"></i>
                                    </h3>
                                    <div className="space-y-4 mb-10 max-h-[300px] overflow-y-auto pr-4 custom-scrollbar">
                                        {users.map((u, i) => (
                                            <div key={u.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-[2rem] group border border-transparent hover:border-emerald-100 transition-all">
                                                <div className="flex items-center gap-4 text-left">
                                                    <div className="w-10 h-10 bg-slate-950 flex items-center justify-center text-white font-black italic rounded-xl shadow-md uppercase">{u.avatar}</div>
                                                    <div>
                                                        <p className="font-black text-slate-800 text-xs leading-none uppercase italic">{u.name}</p>
                                                        <p className="text-[9px] font-black text-emerald-500 uppercase mt-1 italic leading-none">{u.role}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => u.id !== 'u1' && setUsers(users.filter(x => x.id !== u.id))} className={`text-slate-200 ${u.id==='u1'?'opacity-0':'hover:text-rose-500 opacity-0 group-hover:opacity-100'} transition-all`}><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                    <form onSubmit={(e)=>{
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        const uname = fd.get('u_name');
                                        const ulog = fd.get('u_log');
                                        const upass = fd.get('u_pass');
                                        if(uname && ulog && upass) {
                                            setUsers([...users, { id: 'u'+Date.now(), username: ulog, name: uname, role: fd.get('u_role'), avatar: uname.charAt(0).toUpperCase(), pass: upass }]);
                                            e.target.reset();
                                        }
                                    }} className="space-y-4 pt-6 border-t border-dashed text-left">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Registrar Colaborador</p>
                                        <input name="u_name" required placeholder="Nombre Completo" className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-black uppercase outline-none focus:ring-4 focus:ring-emerald-100" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="u_log" required placeholder="ID Usuario" className="p-4 bg-slate-50 border rounded-2xl text-[10px] font-black outline-none focus:ring-4 focus:ring-emerald-100" />
                                            <select name="u_role" className="p-4 bg-slate-50 border rounded-2xl text-[9px] font-black uppercase outline-none italic">
                                                <option>Ejecutiva</option>
                                                <option>Gerente</option>
                                                <option>Admin</option>
                                            </select>
                                        </div>
                                        <input name="u_pass" type="password" required placeholder="Contraseña Temporal" className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-black outline-none focus:ring-4 focus:ring-emerald-100" />
                                        <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-emerald-500/20 active:scale-95 transition-all">Crear Acceso</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* --- MODAL NUEVO REGISTRO --- */}
                        {showModal && (
                            <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-[200] flex items-center justify-center p-6 animate-in">
                                <div className="bg-white w-full max-w-xl rounded-[3rem] p-12 shadow-2xl border-t-[15px] border-t-slate-900">
                                    <div className="flex justify-between items-center mb-10 border-b pb-6">
                                        <h2 className="text-2xl font-black italic uppercase tracking-tighter text-slate-800 leading-none">Nueva Emisión</h2>
                                        <button onClick={()=>setShowModal(false)} className="text-slate-300 hover:text-rose-500 transition-all"><i data-lucide="x" className="w-8 h-8"></i></button>
                                    </div>
                                    <div className="flex gap-2 mb-8 bg-slate-50 p-2 rounded-2xl">
                                        {['policy', 'lead', 'contact'].map(type => (
                                            <button key={type} onClick={()=>setModalType(type)} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${modalType===type?'bg-blue-600 text-white shadow-lg':'text-slate-400'}`}>
                                                {type === 'policy' ? 'Póliza' : type === 'lead' ? 'Lead' : 'Contacto'}
                                            </button>
                                        ))}
                                    </div>
                                    <form onSubmit={handleNewRecord} className="space-y-6 text-left">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nombre Completo</label><input name="client" required className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 shadow-inner" /></div>
                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">WhatsApp</label><input name="phone" required placeholder="809XXXXXXX" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 shadow-inner" /></div>
                                            
                                            {modalType === 'contact' ? (
                                                <div className="col-span-2 space-y-4">
                                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email</label><input name="email" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm" /></div>
                                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Notas</label><input name="notes" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm" /></div>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Ramo Humano</label><select name="branch" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-black uppercase text-xs shadow-inner italic">{branches.map(b=><option key={b.name} value={b.name}>{b.name}</option>)}</select></div>
                                                    {modalType === 'policy' && (
                                                        <>
                                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Prima Anual Bruta</label><input name="premium" type="number" step="0.01" required className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm text-emerald-600 shadow-inner" /></div>
                                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Frecuencia</label><select name="freq" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-black uppercase text-xs italic shadow-inner"><option>Mensual</option><option>Trimestral</option><option>Anual</option></select></div>
                                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Vencimiento</label><input name="expiry" type="date" required className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm" /></div>
                                                        </>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-2xl hover:bg-blue-700 transition-all mt-6 active:scale-95 italic">Finalizar Registro</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* --- CONTACTOS --- */}
                        {activeTab === 'contacts' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden animate-in border border-slate-100">
                                <div className="p-8 border-b bg-slate-50/50 flex justify-between items-center text-left">
                                    <h3 className="font-black italic uppercase tracking-widest text-lg text-slate-800">Directorio de Contactos</h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                                            <tr><th className="p-8">Nombre Completo</th><th className="p-8">WhatsApp</th><th className="p-8">Email</th><th className="p-8 text-right">Acciones</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm">
                                            {contacts.map(c => (
                                                <tr key={c.id} className="hover:bg-blue-50/20 transition-all group">
                                                    <td className="p-8 font-black text-slate-800 uppercase italic">{c.name}</td>
                                                    <td className="p-8 text-blue-600 font-bold font-mono">{c.phone}</td>
                                                    <td className="p-8 text-slate-500">{c.email}</td>
                                                    <td className="p-8 text-right">
                                                        <button onClick={()=>triggerWA('contacto', c)} className="bg-emerald-50 text-emerald-600 p-3 rounded-xl shadow-sm hover:bg-emerald-600 hover:text-white transition-all active:scale-95"><i data-lucide="message-circle" className="w-4 h-4"></i></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* --- CARTERA --- */}
                        {activeTab === 'cartera' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden animate-in border border-slate-100">
                                <div className="p-8 border-b bg-slate-900 text-white flex justify-between items-center">
                                    <h3 className="font-black italic uppercase tracking-widest text-lg">Inventario Activo</h3>
                                    <span className="bg-blue-600 text-white px-5 py-1 rounded-full text-[10px] font-black uppercase italic shadow-lg">{policies.length} pólizas</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                                            <tr><th className="p-6">Asegurado</th><th className="p-6 text-center">Ramo</th><th className="p-6 text-center">Prima</th><th className="p-6 text-center">Pago</th><th className="p-6 text-right">Comisión Proyectada</th><th className="p-6 text-right">Acción</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm italic">
                                            {policies.map(p => {
                                                const rate = branches.find(b => b.name === p.branch)?.commission || 10;
                                                const comm = (p.premium * rate) / 100;
                                                return (
                                                    <tr key={p.id} className="hover:bg-blue-50/30 transition-all group">
                                                        <td className="p-6 font-black text-slate-800 uppercase italic">
                                                            {p.client}
                                                            <p className="text-[9px] text-slate-400 font-bold mt-1 not-italic uppercase">{p.phone}</p>
                                                        </td>
                                                        <td className="p-6 text-center"><span className="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">{p.branch}</span></td>
                                                        <td className="p-6 text-center font-mono font-black text-slate-700 italic">$RD {p.premium.toLocaleString()}</td>
                                                        <td className="p-6 text-center uppercase font-black text-[9px] text-slate-400 italic">{p.freq}</td>
                                                        <td className="p-6 text-right font-black text-emerald-600 font-mono italic">$RD {comm.toLocaleString()}</td>
                                                        <td className="p-6 text-right"><button onClick={()=>triggerWA('renovacion', p)} className="bg-rose-50 text-rose-500 p-3 rounded-xl hover:bg-rose-600 hover:text-white transition-all shadow-sm active:scale-95"><i data-lucide="refresh-cw" className="w-4 h-4"></i></button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
