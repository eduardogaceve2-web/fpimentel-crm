<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fpimentel Seguros CRM</title>
    <script src="https://cdn.tailwindcss.com(https://cdn.tailwindcss.com)"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js(https://unpkg.com/react@18/umd/react.production.min.js)"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js(https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js(https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap(https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap)');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0F172A; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        function App() {
            const [logged, setLogged] = useState(false);
            const [user, setUser] = useState("");
            
            if (!logged) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#0F172A]">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center border-t-8 border-blue-600">
                            <img src="[https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png](https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png)" className="h-20 mx-auto mb-6" />
                            <h1 className="text-2xl font-black italic mb-2 tracking-tighter text-slate-800">FPIMENTEL SEGUROS</h1>
                            <p className="text-slate-400 text-xs mb-8 uppercase tracking-widest font-bold">Acceso de Colaboradores</p>
                            <input onChange={(e)=>setUser(e.target.value)} placeholder="Usuario" className="w-full p-4 bg-slate-50 rounded-2xl mb-4 border outline-none font-bold" />
                            <input type="password" placeholder="Clave (123456)" className="w-full p-4 bg-slate-50 rounded-2xl mb-6 border outline-none font-bold" />
                            <button onClick={()=>setLogged(true)} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 shadow-xl transition-all active:scale-95">Entrar al CRM</button>
                            <p className="mt-6 text-[9px] text-slate-300 font-bold uppercase tracking-widest italic">Vanessa, Don Fernando y Sandra</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden text-slate-800 font-sans">
                    <div className="w-64 bg-[#0F172A] text-white p-8 flex flex-col shrink-0 shadow-2xl">
                        <div className="text-center mb-12">
                            <h2 className="text-xl font-black italic text-blue-400 tracking-widest leading-none uppercase">FPIMENTEL</h2>
                            <p className="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2 italic">Seguros & Fianzas</p>
                        </div>
                        <div className="flex-1 space-y-4 font-sans uppercase text-[10px] tracking-widest font-black">
                            <div className="p-4 bg-blue-600 rounded-2xl shadow-lg italic">🏠 Dashboard</div>
                            <div className="p-4 bg-white/5 rounded-2xl text-slate-400">📄 Cartera</div>
                            <div className="p-4 bg-white/5 rounded-2xl text-slate-400">✅ Tareas</div>
                        </div>
                        <div className="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10 flex items-center space-x-3 italic uppercase text-[10px] font-black tracking-widest">
                           <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold">{user ? user[0].toUpperCase() : 'E'}</div>
                           <span className="truncate">{user || 'Eduardo'}</span>
                        </div>
                    </div>

                    <main className="flex-1 p-12 overflow-y-auto">
                        <header className="mb-12 border-b pb-8 flex justify-between items-end">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter uppercase mb-2">¡Hola, {user || 'Eduardo'}!</h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] italic font-sans">Resumen Operativo Fpimentel Seguros</p>
                            </div>
                            <div className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border border-emerald-100 flex items-center shadow-sm">
                                <span className="h-2 w-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span>
                                Sistema en Línea
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                            <div className="bg-white p-10 rounded-[2.5rem] border-l-[12px] border-blue-600 shadow-xl">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Pólizas Activas hoy</p>
                                <p className="text-7xl font-black tracking-tighter italic text-slate-800 leading-none">24</p>
                            </div>
                            <div className="bg-[#1E293B] p-10 rounded-[2.5rem] border-l-[12px] border-emerald-500 shadow-xl text-white">
                                <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2 italic text-emerald-400">Equipo Activo</p>
                                <p className="text-2xl font-black italic tracking-tighter uppercase leading-tight">Eduardo, Don Fernando y Sandra</p>
                            </div>
                        </div>

                        <div className="bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100">
                            <h3 className="font-black italic uppercase mb-8 border-b pb-6 tracking-widest text-xl text-slate-800">Cartera de Clientes</h3>
                            <div className="space-y-4">
                                {[
                                    { name: "Andrés Pimentel", type: "Automóvil", premium: "12,500", phone: "8094763535" },
                                    { name: "Vanessa Marie Pimentel", type: "Salud", premium: "2,200", phone: "8094763535" },
                                    { name: "Don Fernando Pimentel", type: "Multiriesgo", premium: "45,000", phone: "8094763535" }
                                ].map((p, i) => (
                                    <div key={i} className="flex items-center justify-between p-6 bg-slate-50 rounded-[2rem] hover:bg-white hover:shadow-lg hover:border-blue-100 border border-transparent transition-all group">
                                        <div className="flex items-center space-x-6">
                                            <div className="h-12 w-12 bg-white rounded-2xl flex items-center justify-center font-black text-blue-600 shadow-md border border-slate-100 italic">{p.type[0]}</div>
                                            <div>
                                                <p className="font-black text-slate-800 text-lg leading-none mb-1 uppercase italic tracking-tight">{p.name}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{p.type} <span className="mx-2">•</span> RD$ {p.premium}</p>
                                            </div>
                                        </div>
                                        <button onClick={()=>window.open('[https://wa.me/'+p.phone](https://wa.me/'+p.phone))} className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic hover:bg-emerald-600 hover:text-white transition-all shadow-sm">WhatsApp</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
