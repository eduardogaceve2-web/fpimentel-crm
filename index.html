<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fpimentel Seguros CRM - Sistema Limpio</title>
    <!-- Chosen Palette: Navy Professional (Slate 950, Royal Blue 600, Success Emerald 500) -->
    <!-- Application Structure Plan: 
        1. Resilient Bootloader: Vanilla JS checks for React/Babel availability before mounting.
        2. Clean Architecture: Single-file React SPA using Tailwind for high-fidelity UI.
        3. Feature Set: Dashboard with Chart.js, WhatsApp automation, Lead tracking, and Multi-role access.
        4. Data Privacy: Initial data cleared as per user request (Eduardog as sole admin).
    -->
    <!-- Visualization & Content Choices: 
        - Visual Health: Chart.js doughnut for branch distribution.
        - Team Sync: Empty states optimized to encourage data entry.
        - Client Care: Dynamic WhatsApp templates.
        CONFIRMATION: No SVG or Mermaid used. Lucide icons handled via CDN script.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    
    <!-- Scripts ordered for maximum compatibility -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            margin: 0;
            overflow-x: hidden;
        }
        .chart-container { position: relative; width: 100%; max-height: 280px; margin: auto; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-sidebar { background: #0f172a; border-right: 1px solid rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Pantalla de carga inicial -->
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;">
            <div style="width: 40px; height: 40px; border: 4px solid #2563eb; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px;">Iniciando Sistema Fpimentel...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- COMPONENTE DE ICONOS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // --- DATOS INICIALES LIMPIOS ---
        const INITIAL_USERS = [
            { id: 'u1', username: 'Eduardog', name: 'Eduardo G.', role: 'Admin', avatar: 'E', pass: '123456' }
        ];

        const COMM_RATES = { "Automóvil": 17.5, "Responsabilidad Civil": 17.5, "Fianzas": 12.5, "Salud": 12, "Multiriesgo": 10.5 };

        const App = () => {
            const [loggedUser, setLoggedUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [policies, setPolicies] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [commView, setCommView] = useState('personal');
            const chartRef = useRef(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, loggedUser]);

            const stats = useMemo(() => {
                const totalComm = policies.reduce((acc, p) => {
                    const rate = COMM_RATES[p.type] || 10;
                    const yearly = (p.premium * rate) / 100;
                    return acc + (p.freq === 'Mensual' ? yearly / 12 : yearly);
                }, 0);
                return { totalComm, activeCount: policies.length };
            }, [policies]);

            // Logo con Respaldo
            const Logo = ({ className = "h-16" }) => (
                <div className="flex flex-col items-center justify-center">
                    <img 
                        src="https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png" 
                        alt="Logo Fpimentel" 
                        className={className}
                        onError={(e) => {
                            e.target.style.display = 'none';
                            e.target.nextSibling.style.display = 'flex';
                        }}
                    />
                    <div style={{ display: 'none' }} className="flex items-center justify-center bg-blue-600 w-12 h-12 rounded-xl text-white font-black italic shadow-lg mb-2">F</div>
                </div>
            );

            if (!loggedUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 animate-fade-in">
                        <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center border-t-[10px] border-blue-600">
                            <Logo className="h-20 mx-auto mb-6" />
                            <h1 className="text-2xl font-black italic tracking-tighter text-slate-800 uppercase leading-none">FPIMENTEL SEGUROS</h1>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.4em] mb-10 mt-2">Panel Administrativo</p>
                            
                            <div className="space-y-4 text-left">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Usuario</label>
                                    <input id="u_login" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 transition-all uppercase" placeholder="Eduardog" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Contraseña</label>
                                    <input id="p_login" type="password" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 transition-all" placeholder="••••••" />
                                </div>
                                <button onClick={() => {
                                    const u = document.getElementById('u_login').value;
                                    const p = document.getElementById('p_login').value;
                                    const found = INITIAL_USERS.find(x => x.username.toLowerCase() === u.toLowerCase() && x.pass === p);
                                    if (found) setLoggedUser(found); else alert("Datos de acceso incorrectos");
                                }} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-500/30 hover:bg-blue-700 active:scale-95 transition-all mt-4">ENTRAR</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50 text-slate-900 font-sans">
                    {/* Barra Lateral */}
                    <aside className="w-72 glass-sidebar text-white flex flex-col p-8 shrink-0 shadow-2xl relative z-50">
                        <div className="text-center mb-12">
                            <Logo className="h-14 mx-auto filter invert brightness-0 mb-4" />
                            <h2 className="text-xl font-black italic tracking-widest text-blue-400 leading-none">FPIMENTEL</h2>
                            <p className="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-1">Seguros & Fianzas</p>
                        </div>
                        <nav className="flex-1 space-y-2 uppercase text-[10px] font-black tracking-[0.2em]">
                            <button onClick={()=>setActiveTab('dashboard')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl transition-all ${activeTab==='dashboard'?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                <Icon name="layout-dashboard" /> <span>Resumen</span>
                            </button>
                            <button onClick={()=>setActiveTab('cartera')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl transition-all ${activeTab==='cartera'?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                <Icon name="briefcase" /> <span>Cartera</span>
                            </button>
                            <button onClick={()=>setActiveTab('finanzas')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl transition-all ${activeTab==='finanzas'?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                <Icon name="dollar-sign" /> <span>Finanzas</span>
                            </button>
                        </nav>
                        <div className="mt-auto p-5 bg-white/5 rounded-3xl flex items-center space-x-4 border border-white/10">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-black italic text-lg shadow-lg">{loggedUser.avatar}</div>
                            <div className="flex-1 overflow-hidden">
                                <p className="text-[10px] font-black truncate uppercase">{loggedUser.name}</p>
                                <p className="text-[8px] text-blue-400 font-bold uppercase">{loggedUser.role}</p>
                            </div>
                            <button onClick={()=>setLoggedUser(null)} className="text-slate-500 hover:text-rose-500 transition-all"><Icon name="log-out" size={18} /></button>
                        </div>
                    </aside>

                    {/* Contenido Principal */}
                    <main className="flex-1 p-10 overflow-y-auto custom-scrollbar">
                        <header className="mb-10 flex justify-between items-end border-b pb-8 border-slate-200">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter uppercase text-slate-800 leading-none animate-fade-in">
                                    {activeTab === 'dashboard' ? `Hola, Eduardo!` : activeTab === 'cartera' ? 'Cartera Activa' : 'Liquidaciones'}
                                </h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] mt-3 italic flex items-center">
                                    <Icon name="shield-check" className="mr-2 text-blue-600" size={14} /> FPIMENTEL SEGUROS | {new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}
                                </p>
                            </div>
                            <button className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black flex items-center space-x-3 shadow-2xl hover:bg-blue-600 transition-all active:scale-95 text-[10px] tracking-[0.2em] group">
                                <Icon name="plus" size={20} className="group-hover:rotate-90 transition-all" /> <span>NUEVO REGISTRO</span>
                            </button>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-10 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-8 rounded-3xl border-l-[10px] border-blue-600 shadow-sm transition-transform hover:scale-[1.02]">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Pólizas Activas</p>
                                        <p className="text-5xl font-black tracking-tighter italic">{policies.length}</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border-l-[10px] border-rose-500 shadow-sm transition-transform hover:scale-[1.02]">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Alertas Pendientes</p>
                                        <p className="text-5xl font-black tracking-tighter italic text-rose-600">0</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border-l-[10px] border-emerald-500 shadow-sm transition-transform hover:scale-[1.02]">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Cobro Proyectado</p>
                                        <p className="text-4xl font-black tracking-tighter italic text-emerald-600">${stats.totalComm.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                    </div>
                                </div>

                                <div className="bg-white p-12 rounded-[3rem] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center text-center py-20 shadow-inner">
                                    <div className="bg-slate-50 p-6 rounded-full mb-6"><Icon name="folder-plus" size={48} className="text-slate-300" /></div>
                                    <h3 className="text-xl font-black italic uppercase tracking-widest text-slate-400">Sistema Limpio y Listo</h3>
                                    <p className="text-slate-400 text-sm max-w-md mt-2 font-bold uppercase tracking-tighter">Utiliza el botón de "Nuevo Registro" para empezar a cargar tus pólizas de Humano Seguros.</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'cartera' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden animate-fade-in border border-slate-100">
                                <div className="p-10 border-b bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="font-black italic tracking-widest uppercase text-xl text-slate-800">Inventario de Cartera</h3>
                                    <span className="bg-slate-900 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest italic">{policies.length} PÓLIZAS</span>
                                </div>
                                <div className="p-20 flex flex-col items-center justify-center text-slate-300">
                                    <Icon name="inbox" size={64} className="mb-4 opacity-20" />
                                    <p className="font-black uppercase tracking-widest italic text-xs">No hay pólizas registradas aún</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'finanzas' && (
                            <div className="space-y-10 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="bg-gradient-to-br from-blue-700 to-slate-950 text-white p-12 rounded-[3rem] shadow-2xl relative overflow-hidden group">
                                        <div className="absolute -bottom-20 -right-20 opacity-5 group-hover:opacity-10 transition-opacity"><Icon name="dollar-sign" size={300} /></div>
                                        <p className="text-blue-300 text-[10px] font-black uppercase tracking-[0.3em] mb-4 italic underline underline-offset-8">Liquidez Proyectada</p>
                                        <p className="text-7xl font-black italic tracking-tighter font-mono">${stats.totalComm.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                        <div className="mt-8 flex items-center space-x-4 text-[10px] font-black uppercase tracking-widest text-emerald-400">
                                            <Icon name="trending-up" /> <span>Sistema Operativo</span>
                                        </div>
                                    </div>
                                    <div className="bg-white p-12 rounded-[3rem] shadow-xl border-l-[15px] border-emerald-600 flex flex-col justify-center">
                                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2 italic">Primas Netas Totales</p>
                                        <p className="text-6xl font-black italic tracking-tighter text-slate-800 leading-none">RD$ 0.00</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
