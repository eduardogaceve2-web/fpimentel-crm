<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fpimentel Seguros CRM - Edición Profesional</title>
    <!-- Chosen Palette: Navy Executive (Slate 950, Royal Blue 600, Success Emerald 500, Alert Amber 500) -->
    <!-- Application Structure Plan: 
        1. Navigation: Persistent sidebar with dynamic state management for multi-module access.
        2. Dashboard: High-level analytics using Chart.js to monitor branch health and monthly projections.
        3. Leads & Pipeline: A dedicated funnel to transition prospects from "New" to "Closed" status.
        4. Cartera (Portfolio): Full policy management with specialized WhatsApp triggers for renewals.
        5. Config (Admin): Secure module to manage user roles, permissions, and branch-specific commission rates.
        6. Architecture: React-based SPA in a single file for seamless Vercel deployment.
    -->
    <!-- Visualization & Content Choices: 
        - Financial Insights: Donut charts for premium distribution.
        - Pipeline: Visual column-based layout to track sales progress.
        - Communication: WhatsApp automation templates for "Welcome" and "Renewal" scenarios.
        - Security: Role-based rendering to ensure Admin-only access to financial settings.
        CONFIRMATION: No SVG/Mermaid used. Lucide icons via CDN.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-sidebar { background: #0f172a; }
        .chart-container { position: relative; width: 100%; max-height: 250px; margin: auto; }
        .kanban-col { min-height: 400px; background: rgba(241, 245, 249, 0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root">
        <div class="h-screen flex items-center justify-center bg-slate-950 text-white">
            <p class="font-black uppercase tracking-widest animate-pulse">Cargando Fpimentel Seguros CRM...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- COMPONENTE LOGO CON FALLBACK ---
        const Logo = ({ className = "h-12", textVisible = true }) => {
            const [imgError, setImgError] = useState(false);
            return (
                <div className="flex flex-col items-center gap-2">
                    {!imgError ? (
                        <img 
                            src="https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png" 
                            className={className}
                            onError={() => setImgError(true)}
                        />
                    ) : (
                        <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg">F</div>
                    )}
                    {textVisible && <span className="text-blue-400 font-black tracking-widest text-[10px] uppercase">Fpimentel Seguros</span>}
                </div>
            );
        };

        // --- APP PRINCIPAL ---
        const App = () => {
            const [loggedUser, setLoggedUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Estado de Datos (Simulando Base de Datos)
            const [users, setUsers] = useState([
                { id: 'u1', username: 'Eduardog', name: 'Eduardo G.', role: 'Admin', avatar: 'E', pass: '123456' }
            ]);

            const [branches, setBranches] = useState([
                { name: "Automóvil", commission: 17.5 },
                { name: "Fianzas", commission: 12.5 },
                { name: "Salud", commission: 12.0 },
                { name: "Hogar", commission: 10.5 },
                { name: "PYME", commission: 10.5 }
            ]);

            const [leads, setLeads] = useState([
                { id: 1, name: "Empresa Textil S.A", status: "Nuevo", branch: "PYME", phone: "8095551234", date: "2024-05-11" },
                { id: 2, name: "Roberto Sánchez", status: "Cotización", branch: "Automóvil", phone: "8294445555", date: "2024-05-10" }
            ]);

            const [policies, setPolicies] = useState([
                { id: 101, client: "Construcciones Delta", branch: "Fianzas", premium: 85000, expiry: "2024-06-15", agent: "Eduardog", phone: "8092223333" }
            ]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // --- LÓGICA DE WHATSAPP ---
            const triggerWA = (type, data) => {
                let msg = "";
                if (type === 'nuevo_cliente') {
                    msg = `¡Hola ${data.name}! Un gusto saludarte de Fpimentel Seguros. Hemos recibido tu interés en una póliza de ${data.branch}. ¿Cuándo podemos conversar?`;
                } else if (type === 'renovacion') {
                    msg = `Estimado ${data.client}, le saludamos de Fpimentel Seguros. Su póliza de ${data.branch} vence el ${data.expiry}. ¿Desea que procedamos con la renovación?`;
                }
                window.open(`https://wa.me/${data.phone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            // --- LOGIN ---
            if (!loggedUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                        <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center border-t-[12px] border-blue-600 animate-in">
                            <Logo className="h-20 mx-auto mb-6" />
                            <h1 className="text-2xl font-black italic tracking-tighter text-slate-800 uppercase mb-8">Acceso de Dirección</h1>
                            <div className="space-y-4 text-left">
                                <input id="login_user" placeholder="Usuario" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 transition-all uppercase" />
                                <input id="login_pass" type="password" placeholder="Contraseña" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 transition-all" />
                                <button onClick={() => {
                                    const u = document.getElementById('login_user').value;
                                    const p = document.getElementById('login_pass').value;
                                    const found = users.find(x => x.username.toLowerCase() === u.toLowerCase() && x.pass === p);
                                    if (found) setLoggedUser(found); else alert("Acceso Denegado");
                                }} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 active:scale-95 transition-all mt-4">INGRESAR AL CRM</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar Sidebar */}
                    <aside className="w-72 glass-sidebar text-white flex flex-col p-8 shrink-0 shadow-2xl relative z-50">
                        <div className="text-center mb-12 border-b border-white/5 pb-8">
                            <Logo className="h-16 mx-auto filter invert brightness-0 mb-4" />
                        </div>
                        <nav className="flex-1 space-y-1.5 uppercase text-[10px] font-black tracking-[0.2em]">
                            <button onClick={()=>setActiveTab('dashboard')} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab==='dashboard'?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                <i data-lucide="layout-dashboard" className="w-5 h-5"></i> <span>Dashboard</span>
                            </button>
                            <button onClick={()=>setActiveTab('leads')} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab==='leads'?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                <i data-lucide="users" className="w-5 h-5"></i> <span>Leads</span>
                            </button>
                            <button onClick={()=>setActiveTab('pipeline')} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab==='pipeline'?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                <i data-lucide="trending-up" className="w-5 h-5"></i> <span>Pipeline</span>
                            </button>
                            <button onClick={()=>setActiveTab('cartera')} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab==='cartera'?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                <i data-lucide="briefcase" className="w-5 h-5"></i> <span>Cartera</span>
                            </button>
                            {loggedUser.role === 'Admin' && (
                                <button onClick={()=>setActiveTab('config')} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab==='config'?'bg-blue-600 shadow-xl':'text-slate-400 hover:bg-white/5'}`}>
                                    <i data-lucide="settings" className="w-5 h-5"></i> <span>Ajustes</span>
                                </button>
                            )}
                        </nav>
                        <div className="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10 flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-black italic shadow-lg">{loggedUser.avatar}</div>
                            <div className="flex-1 overflow-hidden">
                                <p className="text-[10px] font-black truncate uppercase tracking-tighter leading-none">{loggedUser.name}</p>
                                <p className="text-[8px] text-blue-400 font-bold uppercase mt-1">{loggedUser.role}</p>
                            </div>
                            <button onClick={()=>setLoggedUser(null)} className="text-slate-500 hover:text-rose-500 transition-all"><i data-lucide="log-out" className="w-4 h-4"></i></button>
                        </div>
                    </aside>

                    {/* Contenido Principal */}
                    <main className="flex-1 p-10 overflow-y-auto custom-scrollbar bg-slate-50">
                        <header className="mb-10 flex justify-between items-end border-b pb-8 border-slate-200 animate-in">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter uppercase text-slate-800 leading-none">
                                    {activeTab === 'dashboard' ? 'Centro de Control' : activeTab === 'leads' ? 'Prospectos Nuevos' : activeTab === 'pipeline' ? 'Embudo de Ventas' : activeTab === 'cartera' ? 'Inventario de Pólizas' : 'Configuración de Agencia'}
                                </h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] mt-3 italic flex items-center">
                                    <i data-lucide="shield-check" className="w-3 h-3 mr-2 text-blue-600"></i> Fpimentel Seguros | Sistema Operativo
                                </p>
                            </div>
                            <button className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-3 shadow-2xl hover:bg-blue-600 transition-all text-[10px] tracking-[0.2em] group">
                                <i data-lucide="plus" className="w-4 h-4 group-hover:rotate-90 transition-all"></i> NUEVO REGISTRO
                            </button>
                        </header>

                        {/* --- MODULO DASHBOARD --- */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-in">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <div className="bg-white p-8 rounded-3xl border-l-[8px] border-l-blue-600 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1 italic">Pólizas Activas</p><p className="text-5xl font-black tracking-tighter italic">{policies.length}</p></div>
                                    <div className="bg-white p-8 rounded-3xl border-l-[8px] border-l-rose-500 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1 italic">Vencimientos (30d)</p><p className="text-5xl font-black tracking-tighter text-rose-600 italic">1</p></div>
                                    <div className="bg-white p-8 rounded-3xl border-l-[8px] border-l-amber-500 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1 italic">Prospectos Nuevos</p><p className="text-5xl font-black tracking-tighter italic">{leads.length}</p></div>
                                    <div className="bg-white p-8 rounded-3xl border-l-[8px] border-l-emerald-500 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-1 italic">Cobro Mes</p><p className="text-3xl font-black text-emerald-600 italic">$RD 14,800</p></div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                                        <h3 className="font-black italic uppercase tracking-widest text-xs mb-6 text-slate-400 flex items-center gap-2"><i data-lucide="pie-chart" className="w-4 h-4"></i> Ramos Humano Seguros</h3>
                                        <div className="chart-container"><canvas id="dashboardChart"></canvas></div>
                                    </div>
                                    <div className="bg-slate-900 text-white p-10 rounded-[2.5rem] shadow-xl relative overflow-hidden flex flex-col justify-center">
                                        <div className="relative z-10">
                                            <h2 className="text-3xl font-black italic tracking-tighter uppercase mb-4 leading-none">Crecimiento Mensual</h2>
                                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-8 leading-relaxed">Manteniendo el ritmo en Automóvil y Fianzas como solicitó Don Fernando.</p>
                                            <button className="bg-blue-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white hover:text-blue-600 transition-all">Ver Reporte Detallado</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- MODULO LEADS --- */}
                        {activeTab === 'leads' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden animate-in border border-slate-100">
                                <div className="p-8 border-b bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="font-black italic tracking-widest uppercase text-lg">Bandeja de Prospectos</h3>
                                    <button className="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">+ Nuevo Lead</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                                            <tr><th className="p-8">Nombre</th><th className="p-8">Interés</th><th className="p-8">Fecha</th><th className="p-8">Contacto</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm">
                                            {leads.map(l => (
                                                <tr key={l.id} className="hover:bg-blue-50/20 transition-all group">
                                                    <td className="p-8 font-black text-slate-800 uppercase italic">{l.name}</td>
                                                    <td className="p-8"><span className="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">{l.branch}</span></td>
                                                    <td className="p-8 text-slate-500 font-bold uppercase text-xs">{l.date}</td>
                                                    <td className="p-8">
                                                        <button onClick={()=>triggerWA('nuevo_cliente', l)} className="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-2 hover:bg-emerald-600 hover:text-white transition-all shadow-sm">
                                                            <i data-lucide="message-circle" className="w-3 h-3"></i> WhatsApp
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* --- MODULO PIPELINE --- */}
                        {activeTab === 'pipeline' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 animate-in">
                                {["Nuevos", "Propuesta", "Ganados"].map((status, i) => (
                                    <div key={status} className="flex flex-col gap-6">
                                        <div className="flex justify-between items-center px-4">
                                            <h4 className="font-black italic uppercase tracking-widest text-slate-400 text-xs">{status}</h4>
                                            <span className="text-[10px] font-black text-blue-600">{i===0?leads.length:0}</span>
                                        </div>
                                        <div className="kanban-col rounded-[2rem] p-6 border-2 border-dashed border-slate-200">
                                            {status === "Nuevos" && leads.map(l => (
                                                <div key={l.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-4 transition-transform hover:scale-[1.02]">
                                                    <p className="font-black text-slate-800 text-sm italic uppercase mb-2">{l.name}</p>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-tighter">{l.branch} • Humano Seguros</p>
                                                    <div className="flex justify-between items-center">
                                                        <i data-lucide="clock" className="w-3 h-3 text-amber-500"></i>
                                                        <button className="text-blue-600 hover:underline text-[10px] font-black uppercase italic">Mover ➔</button>
                                                    </div>
                                                </div>
                                            ))}
                                            <button className="w-full py-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 font-bold text-[10px] uppercase hover:bg-slate-100 transition-all">+ Añadir Lead</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- MODULO CARTERA --- */}
                        {activeTab === 'cartera' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden animate-in border border-slate-100">
                                <div className="p-8 border-b bg-slate-900 text-white flex justify-between items-center">
                                    <h3 className="font-black italic tracking-widest uppercase text-lg">Pólizas en Vigor</h3>
                                    <span className="bg-blue-600 text-white px-5 py-1 rounded-full text-[10px] font-black uppercase italic shadow-lg">{policies.length} REGISTROS</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                                            <tr><th className="p-8">Asegurado</th><th className="p-8">Ramo</th><th className="p-8">Prima Anual</th><th className="p-8">Vencimiento</th><th className="p-8">Gestión</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-sm text-slate-700">
                                            {policies.map(p => (
                                                <tr key={p.id} className="hover:bg-blue-50/30 transition-all group">
                                                    <td className="p-8 font-black text-slate-800 uppercase italic">{p.client}</td>
                                                    <td className="p-8 font-bold uppercase text-xs text-blue-600">{p.branch}</td>
                                                    <td className="p-8 font-black text-slate-700 font-mono italic">$RD {p.premium.toLocaleString()}</td>
                                                    <td className={`p-8 font-black uppercase text-xs ${(new Date(p.expiry)-new Date())/864e5 < 30 ? 'text-rose-600 animate-pulse' : ''}`}>{p.expiry}</td>
                                                    <td className="p-8">
                                                        <div className="flex gap-2">
                                                            <button onClick={()=>triggerWA('renovacion', p)} className="bg-rose-50 text-rose-600 p-2 rounded-xl hover:bg-rose-600 hover:text-white transition-all shadow-sm" title="WhatsApp Renovación">
                                                                <i data-lucide="refresh-cw" className="w-4 h-4"></i>
                                                            </button>
                                                            <button className="bg-slate-100 text-slate-400 p-2 rounded-xl hover:bg-slate-950 hover:text-white transition-all" title="Ver Documento">
                                                                <i data-lucide="file-text" className="w-4 h-4"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* --- MODULO AJUSTES --- */}
                        {activeTab === 'config' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 animate-in">
                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border">
                                    <h3 className="font-black italic uppercase tracking-widest text-lg mb-8 border-b pb-6 flex justify-between items-center">
                                        <span>Tarifario Humano Seguros</span>
                                        <i data-lucide="percent" className="w-5 h-5 text-blue-600"></i>
                                    </h3>
                                    <div className="space-y-4">
                                        {branches.map((b, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl group transition-all hover:bg-white hover:shadow-md border border-transparent hover:border-blue-100">
                                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-600">{b.name}</span>
                                                <div className="flex items-center gap-2">
                                                    <input 
                                                        value={b.commission} 
                                                        onChange={(e)=> {
                                                            const newB = [...branches];
                                                            newB[idx].commission = parseFloat(e.target.value) || 0;
                                                            setBranches(newB);
                                                        }}
                                                        className="w-16 p-2 rounded-xl text-center font-black text-blue-600 text-xs outline-none bg-white border border-slate-200" 
                                                    />
                                                    <span className="text-[10px] font-black text-slate-300">%</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button className="w-full mt-10 bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-blue-600 transition-all shadow-2xl">Actualizar Tasas</button>
                                </div>

                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border">
                                    <h3 className="font-black italic uppercase tracking-widest text-lg mb-8 border-b pb-6 flex justify-between items-center text-emerald-600">
                                        <span>Control de Accesos y Roles</span>
                                        <i data-lucide="user-cog" className="w-5 h-5"></i>
                                    </h3>
                                    <div className="space-y-6">
                                        {users.map(u => (
                                            <div key={u.id} className="flex items-center justify-between p-5 bg-slate-50 rounded-[2rem] border-2 border-transparent hover:border-emerald-100 transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 rounded-2xl bg-slate-950 flex items-center justify-center text-white font-black text-lg italic shadow-lg">{u.avatar}</div>
                                                    <div>
                                                        <p className="font-black text-slate-800 text-sm leading-none mb-1">{u.name}</p>
                                                        <p className="text-[9px] font-black text-emerald-500 uppercase tracking-widest italic">{u.role}</p>
                                                    </div>
                                                </div>
                                                <button className="text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                        ))}
                                        <form className="mt-8 space-y-4 pt-6 border-t border-dashed" onSubmit={(e)=>e.preventDefault()}>
                                            <div className="grid grid-cols-2 gap-4">
                                                <input placeholder="Nombre" className="p-4 bg-slate-50 rounded-2xl text-xs font-bold uppercase outline-none focus:ring-4 focus:ring-emerald-50" />
                                                <select className="p-4 bg-slate-50 rounded-2xl text-xs font-black uppercase outline-none">
                                                    <option>Ejecutiva</option>
                                                    <option>Gerente</option>
                                                </select>
                                            </div>
                                            <button className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-emerald-500/20">Crear Nuevo Usuario</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // --- RENDERIZADO FINAL ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- GRÁFICA DE INICIO ---
        setTimeout(() => {
            const canvas = document.getElementById('dashboardChart');
            if (canvas) {
                new Chart(canvas, {
                    type: 'doughnut',
                    data: {
                        labels: ['Auto', 'Fianzas', 'Salud', 'Hogar'],
                        datasets: [{ data: [45, 25, 20, 10], backgroundColor: ['#2563eb', '#f59e0b', '#10b981', '#64748b'], borderWidth: 0 }]
                    },
                    options: { maintainAspectRatio: false, cutout: '80%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { weight: 'bold', size: 10 } } } } }
                });
            }
        }, 1000);
    </script>
</body>
