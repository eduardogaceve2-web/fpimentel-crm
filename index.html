<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fpimentel Seguros CRM - Operatividad Total</title>
    <!-- Chosen Palette: Navy Professional (Slate 900, Blue 600, Emerald 500) -->
    <!-- Application Structure Plan: 
        1. Login Layer: Control de acceso por roles (Admin, Gerente, Ejecutiva).
        2. Dashboard: Resumen ejecutivo con métricas dinámicas y gráficas de rendimiento (Chart.js).
        3. Cartera de Pólizas: Tabla interactiva con filtros y disparadores de WhatsApp.
        4. Gestión de Comisiones: Módulo financiero jerárquico (Personal, Empresa, Sandra).
        5. Configuración: Panel de control de usuarios y tarifario Humano Seguros.
        Elegido para maximizar la visibilidad de datos financieros y simplificar el cobro a clientes.
    -->
    <!-- Visualization & Content Choices: 
        - Resumen de Cartera -> Informar -> Tarjetas de Métricas -> Justificación: Datos rápidos de pólizas activas.
        - Distribución por Ramo -> Organizar -> Gráfico de Dona (Chart.js) -> Justificación: Ver qué ramo domina la oficina.
        - Seguimiento de Cobros -> Relacionar -> Botones de WhatsApp Directo -> Justificación: Acción inmediata desde el CRM.
        - Tarifario Humano -> Estructurar -> Tabla de Configuración -> Justificación: Flexibilidad ante cambios de la aseguradora.
        Confirmado: NO se usan SVG ni Mermaid. Solo Lucide Icons y CSS estructurado.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .chart-container { position: relative; width: 100%; max-width: 450px; margin-left: auto; margin-right: auto; height: 300px; max-height: 350px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- DATOS INICIALES ---
        const INITIAL_USERS = [
            { id: 'u1', username: 'Eduardog', name: 'Eduardo G.', role: 'Admin', avatar: 'E', pass: '123456' },
            { id: 'u2', username: 'FernadoP', name: 'Fernando P.', role: 'Gerente', avatar: 'F', pass: '123456' },
            { id: 'u3', username: 'Sandrac', name: 'Sandra C.', role: 'Ejecutiva', avatar: 'S', pass: '123456' }
        ];

        const INITIAL_COMMISSIONS = [
            { ramo: "Automóvil", percentage: 17.5 },
            { ramo: "Responsabilidad Civil", percentage: 17.5 },
            { ramo: "Fianzas", percentage: 12.5 },
            { ramo: "Incendio y L.A.", percentage: 10.5 },
            { ramo: "Salud", percentage: 12.0 },
            { ramo: "Vida", percentage: 15.0 }
        ];

        const INITIAL_POLICIES = [
            { id: 1, client: "Don Fernando Pimentel", phone: "8090000000", type: "Automóvil", premium: 12500, expiry: "2025-05-20", agentId: 'u1', freq: 'Mensual' },
            { id: 2, client: "Vanessa Marie Pimentel", phone: "8091111111", type: "Salud", premium: 2200, expiry: "2025-08-15", agentId: 'u3', freq: 'Mensual' },
            { id: 3, client: "Construcciones Delta", phone: "8295551234", type: "Fianzas", premium: 45000, expiry: "2024-12-15", agentId: 'u3', freq: 'Anual' }
        ];

        // --- COMPONENTES UI ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-3xl shadow-sm border border-slate-200 p-6 ${className}`}>{children}</div>
        );

        const App = () => {
            const [loggedUser, setLoggedUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [policies, setPolicies] = useState(INITIAL_POLICIES);
            const [users, setUsers] = useState(INITIAL_USERS);
            const [config, setConfig] = useState(INITIAL_COMMISSIONS);
            const [commView, setCommView] = useState('personal');
            const chartRef = useRef(null);

            // Cálculos Financieros
            const totals = useMemo(() => {
                const getPoliciesByView = () => {
                    if (commView === 'empresa') return policies;
                    if (commView === 'sandra') return policies.filter(p => p.agentId === 'u3');
                    return policies.filter(p => p.agentId === loggedUser?.id);
                };
                
                const filtered = getPoliciesByView();
                const totalPremium = filtered.reduce((acc, p) => acc + p.premium, 0);
                const totalComm = filtered.reduce((acc, p) => {
                    const rate = config.find(c => c.ramo === p.type)?.percentage || 10;
                    const yearly = (p.premium * rate) / 100;
                    return acc + (p.freq === 'Mensual' ? yearly / 12 : p.freq === 'Trimestral' ? yearly / 4 : yearly);
                }, 0);

                return { totalPremium, totalComm, count: filtered.length };
            }, [policies, loggedUser, commView, config]);

            // Gráfica de Rendimiento
            useEffect(() => {
                if (loggedUser && activeTab === 'dashboard') {
                    const ctx = document.getElementById('mainChart');
                    if (ctx) {
                        if (chartRef.current) chartRef.current.destroy();
                        chartRef.current = new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: ['Automóvil', 'Salud', 'Fianzas', 'Otros'],
                                datasets: [{
                                    data: [40, 20, 30, 10],
                                    backgroundColor: ['#2563eb', '#10b981', '#f59e0b', '#64748b'],
                                    borderWidth: 0
                                }]
                            },
                            options: { maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
                        });
                    }
                }
            }, [loggedUser, activeTab]);

            // WhatsApp Trigger
            const handleWA = (p, isWelcome = false) => {
                const msg = isWelcome 
                    ? `¡Hola ${p.client}! Bienvenido a Fpimentel Seguros. Hemos emitido su póliza de ${p.type} con éxito. ¡Gracias!`
                    : `Hola ${p.client}, recordatorio de pago de Fpimentel Seguros por su póliza de ${p.type}. Favor contactarnos.`;
                window.open(`https://wa.me/${p.phone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            if (!loggedUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-t-[12px] border-blue-600">
                            <div className="bg-slate-50 p-6 rounded-3xl mb-8 inline-block shadow-inner">
                                <img src="https://api.typedream.com/v0/document/public/eb0f44b3-8872-4212-a1d1-2f07067a8c57_Imagen_Oscuro_png.png" className="h-20 mx-auto" />
                            </div>
                            <h1 className="text-2xl font-black italic tracking-tighter text-slate-800 uppercase">FPIMENTEL SEGUROS</h1>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.4em] mb-10 mt-2">Gestión de Equipo</p>
                            <div className="space-y-4">
                                <input id="user" placeholder="USUARIO" className="w-full p-5 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 transition-all uppercase" />
                                <input id="pass" type="password" placeholder="CLAVE" className="w-full p-5 bg-slate-50 border rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-100 transition-all" />
                                <button onClick={() => {
                                    const u = document.getElementById('user').value.toLowerCase();
                                    const p = document.getElementById('pass').value;
                                    const found = users.find(x => x.username.toLowerCase() === u && x.pass === p);
                                    if (found) setLoggedUser(found);
                                    else alert("Credenciales Incorrectas");
                                }} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-500/30 hover:bg-blue-700 active:scale-95 transition-all">ACCEDER AL CRM</button>
                            </div>
                            <div className="mt-10 pt-6 border-t border-slate-100 italic text-[9px] text-slate-400 font-bold uppercase tracking-widest">Eduardog / FernadoP / Sandrac</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR NAVEGACION */}
                    <aside className="w-72 bg-[#0F172A] text-white p-8 flex flex-col shrink-0 shadow-2xl relative z-10">
                        <div className="text-center mb-12">
                            <h2 className="text-xl font-black italic text-blue-400 tracking-widest leading-none">FPIMENTEL</h2>
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2">Seguros & Fianzas</p>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 shadow-xl font-black italic' : 'text-slate-400 hover:bg-white/5 uppercase text-[10px] font-bold tracking-widest'}`}>
                                <span>DASHBOARD</span>
                            </button>
                            <button onClick={() => setActiveTab('cartera')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl transition-all ${activeTab === 'cartera' ? 'bg-blue-600 shadow-xl font-black italic' : 'text-slate-400 hover:bg-white/5 uppercase text-[10px] font-bold tracking-widest'}`}>
                                <span>CARTERA CLIENTES</span>
                            </button>
                            {loggedUser.role !== 'Ejecutiva' && (
                                <button onClick={() => setActiveTab('comisiones')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl transition-all ${activeTab === 'comisiones' ? 'bg-blue-600 shadow-xl font-black italic' : 'text-slate-400 hover:bg-white/5 uppercase text-[10px] font-bold tracking-widest'}`}>
                                    <span>LIQUIDACIONES</span>
                                </button>
                            )}
                            {loggedUser.role === 'Admin' && (
                                <button onClick={() => setActiveTab('config')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl transition-all ${activeTab === 'config' ? 'bg-blue-600 shadow-xl font-black italic' : 'text-slate-400 hover:bg-white/5 uppercase text-[10px] font-bold tracking-widest'}`}>
                                    <span>AJUSTES</span>
                                </button>
                            )}
                        </nav>
                        <div className="mt-auto p-5 bg-white/5 rounded-3xl border border-white/10 flex items-center space-x-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-black text-lg italic">{loggedUser.avatar}</div>
                            <div className="flex-1 overflow-hidden">
                                <p className="text-xs font-black truncate uppercase">{loggedUser.name}</p>
                                <p className="text-[9px] text-blue-400 font-bold uppercase">{loggedUser.role}</p>
                            </div>
                            <button onClick={() => setLoggedUser(null)} className="text-slate-500 hover:text-rose-500 transition-colors">🚪</button>
                        </div>
                    </aside>

                    {/* AREA CONTENIDO */}
                    <main className="flex-1 p-12 overflow-y-auto bg-slate-50">
                        <header className="mb-12 border-b border-slate-200 pb-8 flex justify-between items-end">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter uppercase mb-2">¡Hola, {loggedUser.username}!</h1>
                                <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] italic leading-none">Resumen Operativo • {new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
                            </div>
                            <div className="flex space-x-4">
                                <div className="bg-emerald-50 text-emerald-600 px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-emerald-100">Sistema Conectado</div>
                            </div>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-10 animate-slide">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <Card className="border-l-[10px] border-l-blue-600">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Pólizas Activas</p>
                                        <p className="text-6xl font-black tracking-tighter italic text-slate-800 leading-none">{policies.length}</p>
                                    </Card>
                                    <Card className="border-l-[10px] border-l-rose-500">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Alertas Vencimiento</p>
                                        <p className="text-6xl font-black tracking-tighter italic text-rose-600 leading-none">3</p>
                                    </Card>
                                    <Card className="border-l-[10px] border-l-emerald-500">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Próximo Cobro</p>
                                        <p className="text-4xl font-black tracking-tighter italic text-emerald-600 leading-none">${totals.totalComm.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                    </Card>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                    <Card>
                                        <h3 className="font-black italic uppercase mb-8 border-b pb-6 tracking-widest text-xl">Distribución por Ramo</h3>
                                        <div className="chart-container">
                                            <canvas id="mainChart"></canvas>
                                        </div>
                                    </Card>
                                    <Card className="bg-[#1e293b] text-white overflow-hidden relative">
                                        <div className="relative z-10">
                                            <h3 className="font-black italic uppercase mb-6 border-b border-white/5 pb-6 tracking-widest text-xl text-blue-400 italic">Estado del Equipo</h3>
                                            <p className="text-2xl font-black uppercase italic leading-tight mb-8">Vanessa, Don Fernando y Sandra operando al 100%</p>
                                            <div className="bg-blue-600/20 p-6 rounded-[2rem] border border-blue-500/30">
                                                <p className="text-[10px] font-black text-blue-300 uppercase tracking-widest mb-2 italic underline underline-offset-4">Aviso Importante</p>
                                                <p className="text-sm italic text-blue-100 font-medium">"Mantener el seguimiento a las renovaciones de Humano Seguros en el ramo Automóvil."</p>
                                            </div>
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}

                        {activeTab === 'cartera' && (
                            <Card className="p-0 overflow-hidden animate-slide">
                                <div className="p-8 border-b bg-slate-50 flex justify-between items-center">
                                    <h3 className="font-black italic uppercase tracking-widest text-xl">Inventario de Cartera</h3>
                                    <span className="text-[10px] bg-blue-600 text-white px-4 py-1 rounded-full font-black uppercase tracking-widest italic">{policies.length} Registros</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                                            <tr><th className="p-8">Asegurado</th><th className="p-8">Ramo</th><th className="p-8">Prima Anual</th><th className="p-8">Acciones</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {policies.map(p => (
                                                <tr key={p.id} className="hover:bg-blue-50/30 transition-all group">
                                                    <td className="p-8 font-black text-slate-800 text-base italic uppercase">{p.client}</td>
                                                    <td className="p-8 font-bold text-blue-600 text-xs uppercase italic tracking-tighter">{p.type}</td>
                                                    <td className="p-8 font-black text-slate-700 text-sm font-mono italic">${p.premium.toLocaleString()}</td>
                                                    <td className="p-8">
                                                        <button onClick={() => handleWA(p)} className="bg-emerald-50 text-emerald-600 px-6 py-2 rounded-xl text-[9px] font-black uppercase italic tracking-widest border border-emerald-100 hover:bg-emerald-600 hover:text-white transition-all shadow-sm">Enviar WA</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        )}

                        {activeTab === 'comisiones' && (
                            <div className="space-y-10 animate-slide">
                                <div className="flex space-x-4 bg-white p-3 rounded-[2rem] w-fit border shadow-xl">
                                    <button onClick={() => setCommView('personal')} className={`px-8 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest transition-all ${commView === 'personal' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-blue-600'}`}>MI CARTERA</button>
                                    <button onClick={() => setCommView('empresa')} className={`px-8 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest transition-all ${commView === 'empresa' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-blue-600'}`}>OFICINA GLOBAL</button>
                                    <button onClick={() => setCommView('sandra')} className={`px-8 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest transition-all ${commView === 'sandra' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-blue-600'}`}>SANDRA C.</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <Card className="bg-gradient-to-br from-blue-700 to-indigo-950 text-white border-none shadow-2xl p-10">
                                        <p className="text-blue-300 text-[10px] font-black uppercase tracking-[0.3em] mb-4 italic underline underline-offset-8 decoration-blue-500/50">Cobro Proyectado Mes</p>
                                        <p className="text-6xl font-black italic tracking-tighter font-mono">${totals.totalComm.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                                    </Card>
                                    <Card className="border-l-[15px] border-l-emerald-600 shadow-xl flex flex-col justify-center bg-white p-10">
                                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2 italic">Primas Netas Gestionadas</p>
                                        <p className="text-5xl font-black italic tracking-tighter text-slate-800 leading-none">${totals.totalPremium.toLocaleString()}</p>
                                    </Card>
                                </div>
                            </div>
                        )}

                        {activeTab === 'config' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 animate-slide">
                                <Card>
                                    <h3 className="font-black italic uppercase mb-8 border-b pb-6 tracking-widest text-xl flex items-center">⚙️ Tarifas Humano Seguros</h3>
                                    <div className="space-y-3">
                                        {config.map(c => (
                                            <div key={c.ramo} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl hover:border-blue-500 border border-transparent transition-all">
                                                <span className="text-[10px] font-black uppercase tracking-tighter w-2/3">{c.ramo}</span>
                                                <div className="flex items-center space-x-2">
                                                    <input value={c.percentage} type="number" step="0.1" className="w-20 p-2 rounded-xl text-center font-black text-blue-600 text-base bg-white border outline-none" />
                                                    <span className="text-xs font-black text-slate-300">%</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                                <Card>
                                    <h3 className="font-black italic uppercase mb-8 border-b pb-6 tracking-widest text-xl">👥 Equipo de Oficina</h3>
                                    <div className="space-y-4">
                                        {users.map(u => (
                                            <div key={u.id} className="flex items-center justify-between p-5 bg-slate-50 rounded-[2rem]">
                                                <div className="flex items-center space-x-4">
                                                    <div className="w-14 h-14 rounded-2xl bg-slate-900 flex items-center justify-center text-white font-black text-xl italic shadow-xl border-4 border-slate-200">{u.avatar}</div>
                                                    <div>
                                                        <p className="font-black text-slate-800 text-sm tracking-tight leading-none mb-1">{u.name}</p>
                                                        <p className="text-[9px] text-slate-400 font-black uppercase italic tracking-widest">{u.role}</p>
                                                    </div>
                                                </div>
                                                <span className="text-[8px] bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full font-black uppercase tracking-widest italic border border-emerald-200 shadow-sm">Activo</span>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
